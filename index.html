/* ── APP SHELL ── */
function AppShell({onHome}) {
  const [active,setActive] = useState('dashboard');
  const [toasts,pushToast] = useToast();

  /* ── localStorage helpers ── */
  const load = (key, fallback) => {
    try { const v = localStorage.getItem('beacon_'+key); return v ? JSON.parse(v) : (typeof fallback === 'function' ? fallback() : fallback); }
    catch { return typeof fallback === 'function' ? fallback() : fallback; }
  };
  const save = (key, val) => { try { localStorage.setItem('beacon_'+key, JSON.stringify(val)); } catch {} };

  /* ── storage durability ── */
  const [storagePersisted,setStoragePersisted] = useState(null); // null=unknown, true/false=known
  const [storageEstimate,setStorageEstimate] = useState(null);
  const [lastBackupAt,setLastBackupAt] = useState(()=>load('lastBackupAt', null));
  const requestPersist = async () => {
    try {
      if (navigator.storage && navigator.storage.persist) {
        const granted = await navigator.storage.persist();
        setStoragePersisted(granted);
        pushToast(granted ? 'Persistent storage granted — data is now protected from automatic cleanup' : 'Browser declined persistent storage. Keep exporting backups.', granted?'ok':'err');
      }
    } catch { pushToast('Could not request persistent storage','err'); }
  };
  useEffect(()=>{
    // Ask the browser not to auto-evict this app's storage under space pressure,
    // and report current status so the user isn't blindsided by silent data loss.
    (async () => {
      try {
        if (navigator.storage && navigator.storage.persist) {
          const granted = await navigator.storage.persist();
          setStoragePersisted(granted);
        }
        if (navigator.storage && navigator.storage.estimate) {
          setStorageEstimate(await navigator.storage.estimate());
        }
      } catch {}
    })();
  },[]);

  /* ── theme ── */
  const [dark,setDark] = useState(()=>{ const v=localStorage.getItem('beacon_dark'); return v===null?true:v==='true'; });
  useEffect(()=>{ document.body.classList.toggle('light',!dark); save('dark',dark); },[dark]);

  /* ── operating state ── */
  const [profile,setProfile]         = useState(()=>load('profile', initProfile));
  const [strategy,setStrategy]       = useState(()=>load('strategy', initStrategy));
  const [ipTerms,setIpTerms]         = useState(()=>load('ipTerms', [
    {id:1,term:'Beautiful Nonsense',def:'Work that is technically accurate but contextually irrelevant. A dashboard that looks good but helps nobody decide anything.'},
    {id:2,term:'ODS',def:'Operational Data Systems. Lightweight data infrastructure for startups and small businesses that captures daily activity, automates pipelines, and layers dashboards on top.'},
    {id:3,term:'Decision Intelligence',def:'The practice of designing systems that connect day-to-day operations to financial performance, helping businesses understand the economic story behind their numbers.'},
  ]));
  const [proofTiers,setProofTiers]   = useState(()=>load('proofTiers',   initTiers));
  const [proofEntries,setProofEntries] = useState(()=>load('proofEntries', initProof));
  const [phase,setPhase]             = useState(()=>load('phase',   initPhase));
  const [d100,setD100]               = useState(()=>load('d100',    initD100));
  const [dropin,setDropin]           = useState(()=>load('dropin',   initDropin));
  const [settings,setSettings]       = useState(()=>load('settings', {lci:{},general:{}}));
  const [geminiKey,setGeminiKey]     = useState(()=>load('geminiKey', ''));
  const [geminiBackupKeys,setGeminiBackupKeys] = useState(()=>load('geminiBackupKeys', []));
  const [geminiModel,setGeminiModel] = useState(()=>load('geminiModel', 'gemini-2.5-flash'));

  /* ── GitHub sync ── */
  const [githubToken,setGithubToken]   = useState(()=>load('githubToken', ''));
  const [githubRepo,setGithubRepo]     = useState(()=>load('githubRepo', ''));
  const [githubPath,setGithubPath]     = useState(()=>load('githubPath', 'beacon-data.json'));
  const [githubBranch,setGithubBranch] = useState(()=>load('githubBranch', 'main'));
  const [githubIncludeKeys,setGithubIncludeKeys] = useState(()=>load('githubIncludeKeys', false));
  const [githubBusy,setGithubBusy]     = useState(false);
  const [lastPushAt,setLastPushAt]     = useState(()=>load('lastPushAt', null));
  const [lastPullAt,setLastPullAt]     = useState(()=>load('lastPullAt', null));

  /* ── LCI data ── */
  const [lciProfile,setLciProfile]   = useState(()=>load('lciProfile',   {...DEFAULT_PROFILE}));
  const [lciResearch,setLciResearch] = useState(()=>load('lciResearch',  {creators:[],posts:[],hypotheses:[],selectedFormats:[],formatsLibrary:FORMAT_LIBRARY_DEFAULTS}));
  const [lciIdeation,setLciIdeation] = useState(()=>load('lciIdeation',  {ideas:[],history:[],pendingIdea:null}));
  const [lciStudio,setLciStudio]     = useState(()=>load('lciStudio',    {drafts:[],savedPosts:[],calendar:{},pendingIdea:null}));
  const [lciLog,setLciLog]           = useState(()=>load('lciLog',       {entries:[]}));
  const lciBackupKeys = geminiBackupKeys;
  const lciModel = geminiModel;

  /* ── persist all state to localStorage on change ── */
  useEffect(()=>save('strategy',       strategy),       [strategy]);
  useEffect(()=>save('ipTerms',        ipTerms),        [ipTerms]);
  useEffect(()=>save('proofTiers',     proofTiers),     [proofTiers]);
  useEffect(()=>save('proofEntries',   proofEntries),   [proofEntries]);
  useEffect(()=>save('phase',          phase),          [phase]);
  useEffect(()=>save('d100',           d100),           [d100]);
  useEffect(()=>save('dropin',         dropin),         [dropin]);
  useEffect(()=>save('settings',       settings),       [settings]);
  useEffect(()=>save('geminiKey',      geminiKey),      [geminiKey]);
  useEffect(()=>save('geminiBackupKeys', geminiBackupKeys), [geminiBackupKeys]);
  useEffect(()=>save('geminiModel',    geminiModel),    [geminiModel]);
  useEffect(()=>save('githubToken',    githubToken),    [githubToken]);
  useEffect(()=>save('githubRepo',     githubRepo),     [githubRepo]);
  useEffect(()=>save('githubPath',     githubPath),     [githubPath]);
  useEffect(()=>save('githubBranch',   githubBranch),   [githubBranch]);
  useEffect(()=>save('githubIncludeKeys', githubIncludeKeys), [githubIncludeKeys]);
  useEffect(()=>save('lastPushAt',     lastPushAt),     [lastPushAt]);
  useEffect(()=>save('lastPullAt',     lastPullAt),     [lastPullAt]);
  useEffect(()=>save('lciProfile',     lciProfile),     [lciProfile]);
  useEffect(()=>save('lciResearch',    lciResearch),    [lciResearch]);
  useEffect(()=>save('lciIdeation',    lciIdeation),    [lciIdeation]);
  useEffect(()=>save('lciStudio',      lciStudio),      [lciStudio]);
  useEffect(()=>save('lciLog',         lciLog),         [lciLog]);
  useEffect(()=>save('profile',        profile),        [profile]);
  useEffect(()=>save('lastBackupAt',   lastBackupAt),   [lastBackupAt]);

  const sharedKeyIndexRef = useRef(0);
  const getSharedKey = () => {
    const all = [geminiKey,...geminiBackupKeys].filter(k=>k&&k.trim().length>10);
    return all[sharedKeyIndexRef.current % Math.max(1,all.length)] || null;
  };
  const rotateSharedKey = () => {
    const all = [geminiKey,...geminiBackupKeys].filter(k=>k&&k.trim().length>10);
    sharedKeyIndexRef.current = (sharedKeyIndexRef.current + 1) % Math.max(1,all.length);
  };

  const handleExport = () => {
    const data = {
      version:'1.0', exportedAt: new Date().toISOString(),
      geminiKey, geminiBackupKeys, geminiModel,
      lciProfile, lciResearch, lciIdeation, lciStudio, lciLog,
      strategy, ipTerms, proofTiers, proofEntries,
      phase, d100, settings,
      dropin,
    };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `beacon-export-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    setLastBackupAt(new Date().toISOString());
    pushToast('Workspace exported');
  };

  const handleImport = (data) => {
    if(data.lciProfile)      setLciProfile(data.lciProfile);
    if(data.lciResearch)     setLciResearch(data.lciResearch);
    if(data.lciIdeation)     setLciIdeation(data.lciIdeation);
    if(data.lciStudio)       setLciStudio(data.lciStudio);
    if(data.lciLog)          setLciLog(data.lciLog);
    if(data.strategy)        setStrategy(data.strategy);
    if(data.ipTerms)         setIpTerms(data.ipTerms);
    if(data.proofTiers)      setProofTiers(data.proofTiers);
    if(data.proofEntries)    setProofEntries(data.proofEntries);
    if(data.phase)           setPhase(data.phase);
    if(data.d100)            setD100(data.d100);
    if(data.settings)        setSettings(data.settings);
    if(data.geminiModel)     setGeminiModel(data.geminiModel);
    if(data.geminiKey)       setGeminiKey(data.geminiKey);
    if(data.geminiBackupKeys) setGeminiBackupKeys(data.geminiBackupKeys);
    if(data.dropin)          setDropin(data.dropin);
    pushToast('Workspace imported successfully');
  };

  /* ── GitHub sync helpers ── */
  const utf8ToB64 = (str) => {
    const bytes = new TextEncoder().encode(str);
    let binary = ''; bytes.forEach(b=>binary+=String.fromCharCode(b));
    return btoa(binary);
  };
  const b64ToUtf8 = (b64) => {
    const binary = atob(b64.replace(/\n/g,''));
    const bytes = Uint8Array.from(binary, c=>c.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  };
  const buildSyncPayload = () => {
    const data = {
      version:'1.0', exportedAt: new Date().toISOString(),
      lciProfile, lciResearch, lciIdeation, lciStudio, lciLog,
      strategy, ipTerms, proofTiers, proofEntries,
      phase, d100, settings, dropin,
    };
    if (githubIncludeKeys) { data.geminiKey = geminiKey; data.geminiBackupKeys = geminiBackupKeys; data.geminiModel = geminiModel; }
    return data;
  };
  const githubApiUrl = (path) => {
    const [owner,repo] = (githubRepo||'').split('/').map(s=>s.trim());
    if (!owner || !repo) throw new Error('Repo must be in "owner/repo" format');
    return `https://api.github.com/repos/${owner}/${repo}/contents/${(path||githubPath||'beacon-data.json').trim().split('/').map(encodeURIComponent).join('/')}`;
  };
  const pushToGithub = async () => {
    if (!githubToken.trim() || !githubRepo.trim()) { pushToast('Add your GitHub token and repo first','err'); return; }
    setGithubBusy(true);
    try {
      const branch = (githubBranch||'main').trim();
      const url = githubApiUrl();
      const headers = { 'Authorization': `Bearer ${githubToken.trim()}`, 'Accept': 'application/vnd.github+json' };
      let sha;
      const getRes = await fetch(`${url}?ref=${encodeURIComponent(branch)}`, { headers });
      if (getRes.ok) { sha = (await getRes.json()).sha; }
      else if (getRes.status !== 404) { const j = await getRes.json().catch(()=>({})); throw new Error(j.message || `GitHub error ${getRes.status}`); }

      const body = {
        message: `Beacon sync ${new Date().toISOString()}`,
        content: utf8ToB64(JSON.stringify(buildSyncPayload(), null, 2)),
        branch,
      };
      if (sha) body.sha = sha;
      const putRes = await fetch(url, { method:'PUT', headers:{...headers,'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!putRes.ok) { const j = await putRes.json().catch(()=>({})); throw new Error(j.message || `GitHub error ${putRes.status}`); }
      const now = new Date().toISOString();
      setLastPushAt(now); setLastBackupAt(now);
      pushToast('Pushed to GitHub');
    } catch(e) {
      pushToast(e.message || 'Push failed', 'err');
    } finally { setGithubBusy(false); }
  };
  const pullFromGithub = async () => {
    if (!githubToken.trim() || !githubRepo.trim()) { pushToast('Add your GitHub token and repo first','err'); return; }
    if (!window.confirm('This replaces your current data on this device with the version stored on GitHub. Continue?')) return;
    setGithubBusy(true);
    try {
      const branch = (githubBranch||'main').trim();
      const url = `${githubApiUrl()}?ref=${encodeURIComponent(branch)}`;
      const headers = { 'Authorization': `Bearer ${githubToken.trim()}`, 'Accept': 'application/vnd.github+json' };
      const res = await fetch(url, { headers });
      if (res.status === 404) throw new Error('No synced file found yet — push from another device first.');
      if (!res.ok) { const j = await res.json().catch(()=>({})); throw new Error(j.message || `GitHub error ${res.status}`); }
      const j = await res.json();
      const data = JSON.parse(b64ToUtf8(j.content));
      handleImport(data);
      setLastPullAt(new Date().toISOString());
      pushToast('Pulled latest data from GitHub');
    } catch(e) {
      pushToast(e.message || 'Pull failed', 'err');
    } finally { setGithubBusy(false); }
  };

  const handleSendToStudio = (idea) => {
    setLciStudio(s=>({...s,pendingIdea:idea}));
    setActive('studio');
    pushToast('Idea sent to Post Studio');
  };

  const handleSaveToLog = (postData) => {
    const entry = {
      ...postData, id:Date.now(),
      postedAt: new Date().toISOString().slice(0,10),
      dayOfWeek: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()],
      reach:0,likes:0,comments:0,shares:0,saves:0,notes:'',source:'studio',
      loggedAt: new Date().toISOString()
    };
    setLciLog(l=>({entries:[entry,...(l.entries||[])]}));
    setActive('log');
    pushToast('Post sent to Performance Log');
  };



  const sections = ['Operating','Content','System'];
  const activeRoom = ROOMS.find(r=>r.id===active);

  const profilePct = (() => {
    const p = lciProfile;
    const checks=[p.name,p.role,p.valueProp,p.pitch,p.offer,p.boundaries,p.targetAudience,p.currentContext,p.voiceTone,p.personalTraits,(p.writingSamples||[]).length>0];
    return Math.round(checks.filter(Boolean).length/checks.length*100);
  })();
  const hasHypotheses = (lciResearch.hypotheses||[]).filter(h=>h.validated).length > 0;
  const pendingIdeas = (lciIdeation.ideas||[]).length;
  const hasPendingStudio = !!(lciStudio.pendingIdea);
  const unloggedCount = (lciStudio.savedPosts||[]).filter(p=>!(lciLog.entries||[]).find(e=>e.studioId===p.id)).length;

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="sb-logo" onClick={onHome}>
          <div className="sb-icon">
            <svg viewBox="0 0 15 15" fill="none" stroke="#fff" strokeWidth="1.7" strokeLinecap="round">
              <circle cx="7.5" cy="7.5" r="2"/><path d="M7.5 1v2M7.5 12v2M1 7.5h2M12 7.5h2"/><path d="M3 3l1.2 1.2M10.8 10.8l1.2 1.2M10.8 4.2l-1.2 1.2M4.2 10.8l-1.2 1.2" strokeWidth="1.3"/>
            </svg>
          </div>
          <div><div className="sb-name">Beacon</div><div className="sb-ver">Personal Brand OS</div></div>
        </div>
        <div className="sb-scroll">
          {sections.map(sec=>(
            <div key={sec}>
              <div className="sb-sec">{sec}</div>
              {ROOMS.filter(r=>r.section===sec).map(room => {
                let indicator = null;
                if(room.id==='profile'&&profilePct<100) indicator=<span className="nav-new" style={{background:'rgba(245,158,11,.2)',color:'var(--amber)',border:'1px solid rgba(245,158,11,.3)'}}>{profilePct}%</span>;
                if(room.id==='research'&&hasHypotheses) indicator=<span className="nav-new">Active</span>;
                if(room.id==='ideation'&&pendingIdeas>0) indicator=<span className="nav-new">{pendingIdeas}</span>;
                if(room.id==='studio'&&hasPendingStudio) indicator=<span className="nav-new">Ready</span>;
                if(room.id==='log'&&unloggedCount>0) indicator=<span className="nav-new" style={{background:'rgba(239,68,68,.15)',color:'var(--red)',border:'1px solid rgba(239,68,68,.25)'}}>{unloggedCount}</span>;
                if(room.id==='settings'&&!geminiKey) indicator=<span className="nav-new" style={{background:'rgba(239,68,68,.15)',color:'var(--red)',border:'1px solid rgba(239,68,68,.25)'}}>API</span>;
                return (
                  <div key={room.id} className={`nav-item${active===room.id?' active':''}`} onClick={()=>setActive(room.id)}>
                    <div className="nav-dot" style={{background:active===room.id?room.dot:undefined}}/>
                    <span style={{flex:1}}>{room.label}</span>
                    {room.isNew&&!indicator&&<span className="nav-new">New</span>}
                    {indicator}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <div className="sb-foot">
          <div className="key-status">
            <div className="key-dot" style={{background: geminiKey ? 'var(--green)' : 'var(--red)'}}/>
            <span>{geminiKey ? `AIza...${geminiKey.slice(-4)} active` : 'No API key set'}</span>
          </div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div><div className="tb-title">{activeRoom?.label}</div><div className="tb-sub">{activeRoom?.desc}</div></div>
          <div className="tb-right">
            <button className="icon-btn" onClick={()=>{setDark(d=>{const next=!d;document.body.classList.toggle('light',!next);return next;})}}>{dark?'☀':'🌙'}</button>
            <button className="icon-btn" onClick={onHome} title="Home">⌂</button>
          </div>
        </div>
        <div className="content">
          {active==='dashboard' && <Dashboard phase={phase} setPhase={setPhase} d100={d100} setD100={setD100} toast={pushToast}/>}
          {active==='strategy'  && <BrandStrategy strategy={strategy} setStrategy={setStrategy} ipTerms={ipTerms} setIpTerms={setIpTerms} toast={pushToast}/>}
          {active==='proof'     && <SocialProof tiers={proofTiers} setTiers={setProofTiers} entries={proofEntries} setEntries={setProofEntries} geminiKey={geminiKey} geminiBackupKeys={geminiBackupKeys} geminiModel={geminiModel} toast={pushToast}/>}
          {active==='dropin'    && <DropinRoom dropin={dropin} setDropin={setDropin} profile={lciProfile} geminiKey={geminiKey} geminiBackupKeys={geminiBackupKeys} toast={pushToast}/>}
          {active==='profile'   && <ProfileRoom profile={lciProfile} onChange={p=>{setLciProfile(p); setProfile(p);}} showToast={(m)=>pushToast(m)}/>}
          {active==='research'  && <ResearchRoom research={lciResearch} onChange={r=>setLciResearch(r)} showToast={(m)=>pushToast(m)} apiKey={geminiKey} backupKeys={lciBackupKeys} model={lciModel} profileBuckets={lciProfile.buckets||[]}/>}
          {active==='ideation'  && <IdeationRoom ideation={lciIdeation} profile={lciProfile} research={lciResearch} strategy={strategy} ipTerms={ipTerms} proofEntries={proofEntries} onChange={i=>setLciIdeation(i)} onSendToStudio={handleSendToStudio} showToast={(m)=>pushToast(m)} apiKey={geminiKey} backupKeys={geminiBackupKeys} model={geminiModel}/>}
          {active==='studio'    && <PostStudioRoom studio={lciStudio} profile={lciProfile} research={lciResearch} strategy={strategy} onChange={s=>setLciStudio(s)} onSaveToLog={handleSaveToLog} showToast={(m)=>pushToast(m)} apiKey={geminiKey} backupKeys={geminiBackupKeys} model={geminiModel}/>}
          {active==='log'       && <PerformanceLogRoom log={lciLog} studio={lciStudio} research={lciResearch} onChange={l=>setLciLog(l)} showToast={(m)=>pushToast(m)}/>}
          {active==='settings'  && <Settings settings={settings} setSettings={setSettings} geminiKey={geminiKey} setGeminiKey={setGeminiKey} geminiBackupKeys={geminiBackupKeys} setGeminiBackupKeys={setGeminiBackupKeys} geminiModel={geminiModel} setGeminiModel={setGeminiModel} lciProfile={lciProfile} setLciProfile={setLciProfile} setLciResearch={setLciResearch} setLciIdeation={setLciIdeation} setLciStudio={setLciStudio} setLciLog={setLciLog} setStrategy={setStrategy} setIpTerms={setIpTerms} setProofTiers={setProofTiers} setProofEntries={setProofEntries} setPhase={setPhase} setD100={setD100} setDropin={setDropin} darkMode={dark} setDarkMode={(v)=>{setDark(v);document.body.classList.toggle('light',!v);}} onExport={handleExport} onImport={handleImport} toast={pushToast} storagePersisted={storagePersisted} requestPersist={requestPersist} lastBackupAt={lastBackupAt} githubToken={githubToken} setGithubToken={setGithubToken} githubRepo={githubRepo} setGithubRepo={setGithubRepo} githubPath={githubPath} setGithubPath={setGithubPath} githubBranch={githubBranch} setGithubBranch={setGithubBranch} githubIncludeKeys={githubIncludeKeys} setGithubIncludeKeys={setGithubIncludeKeys} githubBusy={githubBusy} lastPushAt={lastPushAt} lastPullAt={lastPullAt} onPushGithub={pushToGithub} onPullGithub={pullFromGithub}/>}
          {!['dashboard','strategy','proof','dropin','profile','research','ideation','studio','log','settings'].includes(active) && <PlaceholderRoom room={activeRoom||ROOMS[0]}/>}
        </div>
      </div>
      <Toasts items={toasts}/>
    </div>
  );
}

/* ── ROOT ── */
function App() {
  const [screen,setScreen] = useState('app');
  return screen==='home' ? <HomePage onEnter={()=>setScreen('app')}/> : <AppShell onHome={()=>setScreen('home')}/>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
