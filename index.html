          <button className={`tab-btn ${tab==='hypotheses'?'active':''}`} onClick={()=>setTab('hypotheses')}>Hypotheses {hypotheses.length>0&&`(${hypotheses.length})`}</button>
        </div>

        {tab==='creators' && (
          <div>
            <div className="card">
              <div className="card-header"><div><div className="card-title">Find Creators to Study</div><div className="card-sub">Describe your niche and the AI will suggest top LinkedIn creators worth researching</div></div></div>
              <div className="card-body">
                <div className="grid-2">
                  <div className="field"><label className="label">Your niche</label><input className="input" value={niche} onChange={e=>setNiche(e.target.value)} placeholder="e.g. business operations, data analytics, finance for SMBs"/></div>
                  <div className="field"><label className="label">Target audience type</label><input className="input" value={audience} onChange={e=>setAudience(e.target.value)} placeholder="e.g. small business owners, startup founders"/></div>
                </div>
                <div className="field"><label className="label">Additional criteria<span className="label-hint"> optional</span></label><input className="input" value={criteria} onChange={e=>setCriteria(e.target.value)} placeholder="e.g. practical over theoretical, strong engagement"/></div>
                <div style={{display:'flex',justifyContent:'flex-end'}}>
                  <button className="btn btn-primary" onClick={discoverCreators} disabled={loadingC} style={{minWidth:140,justifyContent:'center'}}>
                    {loadingC?<><span className="lci-spinner"/> Finding...</>:'Find Creators'}
                  </button>
                </div>
              </div>
            </div>
            {creators.length>0&&(
              <div className="card">
                <div className="card-header"><div><div className="card-title">Suggested Creators</div><div className="card-sub">Search each on LinkedIn, study their posts, then add them to Post Analysis</div></div><button className="btn btn-ghost btn-sm" onClick={()=>{setCreators([]);onChange({creators:[],posts,hypotheses,selectedFormats:selFormats});}}>Clear</button></div>
                <div className="card-body">
                  {creators.map(c=>(
                    <div key={c.id} className="creator-card">
                      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{c.name}</div>
                          <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>{c.title}</div>
                          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:6}}>{c.why}</div>
                          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                            <span style={{fontSize:10.5,background:'var(--blue-dim)',color:'var(--blue)',padding:'2px 8px',borderRadius:20}}>{c.contentStyle}</span>
                            <span style={{fontSize:10.5,background:'var(--green-dim)',color:'var(--green)',padding:'2px 8px',borderRadius:20}}>{c.focus}</span>
                          </div>
                        </div>
                        <a href={`https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(c.name)}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:'var(--blue)',whiteSpace:'nowrap',textDecoration:'none',background:'var(--blue-dim)',padding:'5px 10px',borderRadius:6,flexShrink:0}}>Find on LinkedIn</a>
                      </div>
                    </div>
                  ))}
                  <div className="info-box yellow" style={{marginTop:12}}><div style={{fontSize:12,color:'var(--amber)',lineHeight:1.6}}>These are AI-suggested creators based on general knowledge. Verify them on LinkedIn before studying their posts.</div></div>
                </div>
              </div>
            )}
            {creators.length===0&&<div style={{textAlign:'center',padding:'48px',color:'var(--text3)',fontSize:13}}>Enter your niche above and click Find Creators.</div>}
          </div>
        )}

        {tab==='posts' && (
          <div>
            <div className="card">
              <div className="card-header">
                <div><div className="card-title">Post Analysis Table</div><div className="card-sub">Paste posts with engagement data. The AI will grade and analyse them.</div></div>
                <div style={{display:'flex',gap:8}}>
                  {posts.length>=3&&<button className="btn btn-green btn-sm" onClick={analyseAll} disabled={loadingA} style={{minWidth:100,justifyContent:'center'}}>{loadingA?<><span className="lci-spinner"/> Analysing...</>:'Analyse All'}</button>}
                  <button className="btn btn-primary btn-sm" onClick={()=>setShowPostForm(f=>!f)}>{showPostForm?'Cancel':'+ Add Post'}</button>
                </div>
              </div>
              {showPostForm&&(
                <div className="card-body" style={{borderTop:'1px solid var(--border)'}}>
                  <div className="field"><label className="label">Post content</label><textarea className="input" rows={4} value={postForm.content} onChange={e=>setPostForm({...postForm,content:e.target.value})} placeholder="Paste the post text..."/></div>
                  <div className="field"><label className="label">Creator name<span className="label-hint"> optional</span></label><input className="input" value={postForm.creator} onChange={e=>setPostForm({...postForm,creator:e.target.value})} placeholder="Whose post is this?"/></div>
                  <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
                    {['likes','comments','shares','saves'].map(k=>(
                      <div key={k}><div style={{fontSize:10.5,color:'var(--text3)',marginBottom:4,textTransform:'capitalize'}}>{k}</div><input className="eng-input" type="number" min="0" value={postForm[k]} onChange={e=>setPostForm({...postForm,[k]:parseInt(e.target.value)||0})}/></div>
                    ))}
                  </div>
                  <button className="btn btn-primary" onClick={addPost}>Add Post</button>
                </div>
              )}
              {posts.length>0&&(
                <div style={{overflowX:'auto'}}>
                  <table className="post-table">
                    <thead><tr><th>Post</th><th>Creator</th><th style={{textAlign:'center'}}>Likes</th><th style={{textAlign:'center'}}>Comments</th><th style={{textAlign:'center'}}>Shares</th><th style={{textAlign:'center'}}>Saves</th><th>Grade</th><th></th></tr></thead>
                    <tbody>{posts.map(p=>{
                      const g=gradePost(p);
                      return(<tr key={p.id}>
                        <td style={{maxWidth:200}}><div style={{fontSize:12,lineHeight:1.5,maxHeight:48,overflow:'hidden'}}>{p.content.slice(0,100)}{p.content.length>100?'...':''}</div></td>
                        <td style={{fontSize:11.5,color:'var(--text3)'}}>{p.creator||'Unknown'}</td>
                        <td style={{textAlign:'center',fontSize:12.5}}>{p.likes||0}</td>
                        <td style={{textAlign:'center',fontSize:12.5}}>{p.comments||0}</td>
                        <td style={{textAlign:'center',fontSize:12.5}}>{p.shares||0}</td>
                        <td style={{textAlign:'center',fontSize:12.5}}>{p.saves||0}</td>
                        <td><span className={`grade-badge grade-${g}`}>{g==='gold'?'Gold':g==='silver'?'Silver':g==='bronze'?'Bronze':'Pending'}</span></td>
                        <td><button className="btn btn-danger btn-sm" onClick={()=>removePost(p.id)}>×</button></td>
                      </tr>);
                    })}</tbody>
                  </table>
                </div>
              )}
              {posts.length===0&&!showPostForm&&<div style={{textAlign:'center',padding:'32px 20px',fontSize:12,color:'var(--text3)'}}>No posts yet. Add posts from LinkedIn to start analysing patterns.</div>}
            </div>
          </div>
        )}

        {tab==='hypotheses' && (
          <div>
            <div className="card">
              <div className="card-header"><div><div className="card-title">Content Hypotheses</div><div className="card-sub">Generated from your post analysis. Validate the ones that resonate.</div></div></div>
              <div className="card-body">
                {hypotheses.length===0&&<div style={{textAlign:'center',padding:'32px 20px',fontSize:12,color:'var(--text3)'}}>No hypotheses yet. Add at least 3 posts to the Post Analysis table and click Analyse All.</div>}
                {hypotheses.map(h=>(
                  <div key={h.id} className="hyp-card" style={{borderColor:h.validated?'var(--green)':'var(--border2)'}}>
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
                      <div style={{flex:1,fontSize:12.5,color:'var(--text)',lineHeight:1.6}}>{h.text}</div>
                      <div style={{display:'flex',gap:6,flexShrink:0}}>
                        <button className={`btn btn-sm ${h.validated?'btn-green':'btn-ghost'}`} onClick={()=>toggleHypValidated(h.id)}>{h.validated?'Validated':'Validate'}</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>removeHyp(h.id)}>×</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </>)}

      {mode==='library' && (
        <div>
          {/* Search */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-header"><div><div className="card-title">Search for Formats</div><div className="card-sub">Describe what you are looking for — the AI will find documented LinkedIn post frameworks and add them to your library</div></div></div>
            <div className="card-body">
              <div style={{display:'flex',gap:8,marginBottom:8}}>
                <input className="input" style={{flex:1}} value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&searchFormats()} placeholder="e.g. storytelling formats, engagement formats, thought leadership structures..."/>
                <button className="btn btn-primary" onClick={searchFormats} disabled={loadingS} style={{flexShrink:0}}>{loadingS?<><span className="lci-spinner"/> Searching...</>:'Search'}</button>
              </div>
              <div style={{fontSize:11,color:'var(--text3)'}}>Results are added to your library as new cards below. You can edit or delete any card at any time.</div>
            </div>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <div style={{fontSize:12.5,color:'var(--text2)'}}>
                {formatsLib.length} format{formatsLib.length!==1?'s':''} in your library.{' '}
                {selFormats.length>0&&<span style={{color:'var(--blue)',fontWeight:600}}>{selFormats.length} selected for use.</span>}
              </div>
              {/* Funnel filter pills */}
              {['','awareness','education','consideration','conversion'].map(stage=>{
                const COLORS = {awareness:'#3D7EFF',education:'#00C896',consideration:'#8B5CF6',conversion:'#EF4444'};
                const labels = {awareness:'Awareness',education:'Education',consideration:'Consideration',conversion:'Conversion'};
                const isActive = funnelFilter===stage;
                return (
                  <button key={stage} onClick={()=>setFunnelFilter(stage)}
                    style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'var(--font-body)',transition:'all .15s',
                      border:`1px solid ${isActive?(stage?COLORS[stage]:'var(--border2)'):'var(--border)'}`,
                      background:isActive?(stage?COLORS[stage]+'18':'var(--bg3)'):'transparent',
                      color:isActive?(stage?COLORS[stage]:'var(--text)'):'var(--text3)'}}>
                    {stage?labels[stage]:'All'}
                  </button>
                );
              })}
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-g btn-sm" onClick={autoTagFormats} disabled={loadingS} title="Auto-detect funnel stages for all formats">
                {loadingS?<><span className="lci-spinner"/>Tagging...</>:'✦ Auto-tag all'}
              </button>
              <button className="btn btn-p btn-sm" onClick={()=>{syncFormats(formatsLib,selFormats);showToast('Selection saved');}} disabled={selFormats.length===0}>Save selection</button>
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:12}}>
            {formatsLib
              .filter(f=>!funnelFilter||(f.funnelStages||[]).includes(funnelFilter))
              .map(f=>(
              <FormatLibCard key={f.id} f={f} sel={selFormats.includes(f.id)} expanded={expandedFormat===f.id} buckets={buckets}
                onToggle={()=>toggleFormat(f.id)}
                onExpand={()=>setExpandedFormat(expandedFormat===f.id?null:f.id)}
                onSave={updated=>{const u=formatsLib.map(x=>x.id===f.id?updated:x);syncFormats(u);showToast('Format saved');}}
                onDelete={()=>{const u=formatsLib.filter(x=>x.id!==f.id);const s=selFormats.filter(id=>id!==f.id);syncFormats(u,s);showToast('Format deleted');}}
              />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── IDEATION ROOM ── */
function IdeationRoom({ ideation, profile, research, strategy, ipTerms, proofEntries, onChange, onSendToStudio, showToast, apiKey, backupKeys=[], model }) {
  const lib = research.formatsLibrary || [];
  const selFormatIds = research.selectedFormats || [];
  const availableFormats = lib.filter(f=>selFormatIds.includes(f.id));
  const hypotheses = (research.hypotheses||[]).filter(h=>h.validated);

  const FUNNEL_STAGES = [
    { id:'awareness',     label:'Awareness',     color:'#3D7EFF' },
    { id:'education',     label:'Education',     color:'#00C896' },
    { id:'consideration', label:'Consideration', color:'#8B5CF6' },
    { id:'conversion',    label:'Conversion',    color:'#EF4444' },
  ];

  const [entryMode, setEntryMode] = useState('generate');
  const [ideas, setIdeas] = useState(ideation.ideas||[]);
  const [history, setHistory] = useState(ideation.history||[]);
  const [selFunnel, setSelFunnel] = useState('');
  const [selFormat, setSelFormat] = useState('');
  const [steerInput, setSteerInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [customIdea, setCustomIdea] = useState('');
  const [customFunnel, setCustomFunnel] = useState('');
  const [customFormat, setCustomFormat] = useState('');

  const sync = (newIdeas, newHistory) => {
    setIdeas(newIdeas);
    setHistory(newHistory);
    onChange({ideas:newIdeas, history:newHistory, pendingIdea:ideation.pendingIdea});
  };

  const buildProfileContext = () => `CREATOR PROFILE:
Name: ${profile.name||'Ehijele David'}
Role: ${profile.role||'Data analyst, Decision Intelligence Systems'}
Offer: ${profile.offer||profile.valueProp||'Builds operational data infrastructure for small and growing businesses — the system that connects daily operations to financial performance.'}
Target audience: ${profile.targetAudience||'Small and growing business owners, founders, operators who need visibility into their own operations.'}
Current context: ${profile.currentContext||''}
Voice: ${profile.voiceTone||'Curious, systems-minded, direct, warm. Not corporate. No em dashes.'}
Personal traits: ${profile.personalTraits||''}`;

  const buildIPContext = () => (ipTerms||[]).length>0
    ? `\nPROPRIETARY LANGUAGE AND IP:\n${(ipTerms||[]).map(t=>`- ${t.term}: ${t.def}`).join('\n')}`
    : '';

  const buildProofContext = () => (proofEntries||[]).length>0
    ? `\nSOCIAL PROOF ENTRIES:\n${(proofEntries||[]).slice(0,4).map((e,i)=>`${i+1}. ${e.text}`).join('\n')}`
    : '';

  const buildPrompt = (funnel, steer, fmt) => {
    const profileCtx = buildProfileContext();
    const ipCtx = buildIPContext();
    const proofCtx = buildProofContext();
    const fmtCtx = fmt ? `\nPREFERRED FORMAT: ${fmt.name} — ${fmt.when}` : '';
    const steerCtx = steer.trim() ? `\nDIRECTION: ${steer}` : '';
    const hypsCtx = hypotheses.length ? `\nVALIDATED RESEARCH (score ideas against these):\n${hypotheses.map((h,i)=>`${i+1}. ${h.text}`).join('\n')}` : '';
    const outputInstr = `\nGenerate exactly 5 specific, concrete post ideas. Each must be a real angle someone could sit down and write TODAY.\n\nReturn ONLY a valid JSON array. Each object has exactly these keys: hook (one concise sentence, max 20 words), angle (one sentence, max 20 words, on why this lands), viralScore (integer 1-5), scoreReason (one sentence, max 15 words). Keep all strings short and direct. No em dashes. No apostrophes inside strings.`;

    if(funnel==='awareness') {
      return `You are a LinkedIn content strategist with access to Google Search. Your task is to find pre-validated content ideas for a data analyst targeting small business owners and founders.

WHAT AWARENESS CONTENT MEANS HERE:
These are posts built around concepts, problems, and ideas that founders and operators ALREADY engage with and talk about — not posts about the creator's specific work or methodology. Like James Clear writing about habits (a pre-existing, proven concept), the creator writes about proven topics from their own perspective and positioning. The ideas must be relevant to founders and operators but do not need to be about data or analytics specifically.

${profileCtx}

YOUR TASK:
Search for what small business owners, founders, and operators are currently engaging with, talking about, and finding useful. Find pre-validated concepts in areas like: business operations, decision-making, scaling a business, leadership, productivity, financial clarity, team management, business systems. Then generate 5 specific post ideas the creator can write, connecting those proven concepts to their positioning and voice.

DO NOT generate ideas about data analytics skills or technical topics — think about the founder's world, not the analyst's world.
${steerCtx}${fmtCtx}${hypsCtx}${outputInstr}`;
    }

    if(funnel==='education') {
      return `You are a LinkedIn content strategist helping a data analyst generate educational post ideas.

WHAT EDUCATION CONTENT MEANS HERE:
Teaching the target audience something specific and useful about running a business, understanding their operations, or making better decisions. NOT teaching data analytics as a skill. Teaching a founder something that changes how they think about THEIR business. The reader should finish the post knowing something they can use.

${profileCtx}${ipCtx}

YOUR TASK:
Based on this creator's expertise and offer, what are 5 specific things a founder running a growing business does NOT know — or gets wrong — that this creator could teach them? Each idea should be specific enough that you can already see the first paragraph. Draw from the creator's actual expertise: operational clarity, data systems, financial performance, the gap between what businesses track and what actually matters.
${steerCtx}${fmtCtx}${hypsCtx}${outputInstr}`;
    }

    if(funnel==='consideration') {
      return `You are a LinkedIn content strategist helping a data analyst generate consideration-stage post ideas.

WHAT CONSIDERATION CONTENT MEANS HERE:
Posts that show HOW this person thinks, what they believe, what makes their approach different. This is trust-building content. Contrarian takes, strong opinions, named frameworks, the philosophy behind how they work. The reader should finish thinking "I have not heard anyone put it that way before."

${profileCtx}${ipCtx}

BRAND STRATEGY CONTEXT:
Point of view: ${strategy?.pov||''}
What they are against: ${strategy?.against||''}

YOUR TASK:
Generate 5 specific post ideas that surface this creator's unique thinking. Challenge something founders take for granted. Show how this person approaches a problem differently. Use their IP and frameworks where relevant. Make the reader feel the creator has a genuine, distinct philosophy — not just technical skills.
${steerCtx}${fmtCtx}${hypsCtx}${outputInstr}`;
    }

    if(funnel==='conversion') {
      return `You are a LinkedIn content strategist helping a data analyst generate conversion-stage post ideas.

WHAT CONVERSION CONTENT MEANS HERE:
Posts that show proof of transformation. Before and after. A founder who had a problem, worked with this creator, and now sees their business differently. No client names. Specific enough that a warm reader thinks "this is exactly my situation." The goal is to make the right person reach out.

${profileCtx}${ipCtx}${proofCtx}

YOUR TASK:
Generate 5 specific transformation story angles. Each should describe a recognizable "before" situation a founder would relate to, and a specific "after" state they would want. If social proof entries are available above, draw from those real situations. If not, draw from the creator's offer and generate believable transformation scenarios.
${steerCtx}${fmtCtx}${outputInstr}`;
    }

    return '';
  };

  const callGeminiIdeas = async (prompt) => {
    const allKeys = [apiKey,...backupKeys].filter(k=>k&&k.trim().length>10);
    if(!allKeys.length) throw new Error('No API key set. Add one in Settings.');
    let lastError;
    for(let i=0;i<allKeys.length;i++) {
      try {
        const resp = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${allKeys[i]}`,
          {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              contents:[{parts:[{text:prompt}]}],
              generationConfig:{
                maxOutputTokens:8192,
                temperature:0.82,
                responseMimeType:'application/json'
              }
            })
          }
        );
        if(!resp.ok) {
          const e = await resp.json().catch(()=>({}));
          if(resp.status===429){ lastError=new Error('Quota hit, try again'); continue; }
          throw new Error(e.error?.message||`HTTP ${resp.status}`);
        }
        const data = await resp.json();
        const text = (data.candidates?.[0]?.content?.parts||[]).filter(p=>p.text).map(p=>p.text).join('');
        if(!text) throw new Error('Empty response');
        return text;
      } catch(e) { lastError=e; continue; }
    }
    throw lastError||new Error('All keys failed');
  };

  const generateIdeas = async () => {
    if(!apiKey){ showToast('Add API key in Settings','!'); return; }
    if(!selFunnel){ showToast('Select a funnel stage first','!'); return; }
    setLoading(true);
    try {
      const fmt = availableFormats.find(f=>f.id===selFormat);
      const prompt = buildPrompt(selFunnel, steerInput, fmt);
      const raw = await callGeminiIdeas(prompt);
      console.log('Gemini raw response:', raw);
      let parsed;
      try {
        parsed = JSON.parse(raw);
        if(!Array.isArray(parsed)) {
          // Model returned an object — find the array inside it
          const arr = Object.values(parsed).find(v=>Array.isArray(v));
          if(arr) {
            parsed = arr;
          } else {
            // Object with no array — try values recursively one level deeper
            const nested = Object.values(parsed).flatMap(v => typeof v === 'object' && v !== null ? Object.values(v) : [v]).find(v=>Array.isArray(v));
            parsed = nested || [];
          }
        }
      } catch(e) {
        console.log('Direct parse failed:', e.message, 'Raw:', raw);
        const m = raw.match(/\[[\s\S]*\]/);
        if(m) {
          try { parsed = JSON.parse(m[0]); } catch(e2) { parsed = []; }
        } else { parsed = []; }
      }
      console.log('Parsed ideas:', parsed);
      if(!parsed || !parsed.length) {
        console.log('Empty result. Raw was:', raw);
        throw new Error('No ideas returned. Check console for raw response.');
      }
      const funnel = FUNNEL_STAGES.find(f=>f.id===selFunnel);
      const newIdeas = parsed.map((idea,i)=>({
        ...idea, id:Date.now()+i,
        funnelStage:selFunnel, funnelLabel:funnel?.label||'',
        formatId:selFormat, formatName:fmt?.name||'Open format',
        createdAt:new Date().toISOString()
      }));
      sync(newIdeas, history);
      showToast(`${newIdeas.length} ideas generated`);
    } catch(e) { showToast(e.message||'Generation failed. Try again.','x'); }
    setLoading(false);
  };

  const handleCustomSend = () => {
    if(!customIdea.trim()){ showToast('Add your idea first','!'); return; }
    const fmt = availableFormats.find(f=>f.id===customFormat);
    const funnel = FUNNEL_STAGES.find(f=>f.id===customFunnel);
    const idea = {
      id:Date.now(), hook:customIdea.trim(), angle:'Custom idea',
      viralScore:null, scoreReason:'Your own idea',
      funnelStage:customFunnel, funnelLabel:funnel?.label||'',
      formatId:customFormat||'', formatName:fmt?.name||'Open format',
      createdAt:new Date().toISOString(), custom:true
    };
    setCustomIdea(''); setCustomFunnel(''); setCustomFormat('');
    onSendToStudio(idea);
    showToast('Idea sent to Post Studio');
  };

  const FunnelBadge = ({stage}) => {
    const f = FUNNEL_STAGES.find(x=>x.id===stage);
    if(!f) return null;
    return <span style={{fontSize:10.5,padding:'2px 9px',borderRadius:20,background:f.color+'18',color:f.color,fontWeight:600,border:`1px solid ${f.color}30`}}>{f.label}</span>;
  };

  const STAGE_DESCRIPTIONS = {
    awareness: "Finds pre-validated concepts your audience already engages with. Ideas are about the founder's world, not yours. Broad enough that anyone running a business connects.",
    education: 'Reads your offer and expertise. Generates specific things you can teach a founder that would change how they run their business.',
    consideration: 'Reads your POV, IP vault, and brand strategy. Surfaces your unique thinking and methodology.',
    conversion: 'Reads your social proof entries. Generates transformation story angles built from real proof.',
  };

  return (
    <div className="lci-room">
      <div className="entry-tabs">
        <button className={`entry-tab ${entryMode==='generate'?'active':''}`} onClick={()=>setEntryMode('generate')}>Generate Ideas</button>
        <button className={`entry-tab ${entryMode==='custom'?'active':''}`} onClick={()=>setEntryMode('custom')}>My Own Idea</button>
        <button className={`entry-tab ${entryMode==='history'?'active':''}`} onClick={()=>setEntryMode('history')}>Idea History {history.length>0&&`(${history.length})`}</button>
      </div>

      {entryMode==='generate' && (
        <div>
          <div className="card">
            <div className="card-header"><div><div className="card-title">Generate Post Ideas</div><div className="card-sub">Pick a funnel stage. The AI reads your full profile, IP, and proof to generate ideas specific to you.</div></div></div>
            <div className="card-body">
              <div className="field">
                <label className="label">Funnel stage<span className="label-hint"> what kind of post do you need?</span></label>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:selFunnel?8:0}}>
                  {FUNNEL_STAGES.map(f=>(
                    <button key={f.id} onClick={()=>setSelFunnel(f.id)}
                      style={{padding:'8px 16px',borderRadius:20,border:`1.5px solid ${selFunnel===f.id?f.color:' var(--border2)'}`,background:selFunnel===f.id?f.color+'18':'transparent',color:selFunnel===f.id?f.color:'var(--text2)',cursor:'pointer',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600,transition:'all .15s'}}>
                      {f.label}
                      
                    </button>
                  ))}
                </div>
                {selFunnel&&(
                  <div style={{fontSize:11.5,color:'var(--text3)',lineHeight:1.6,padding:'8px 12px',background:'var(--bg3)',borderRadius:7,marginTop:6}}>
                    {STAGE_DESCRIPTIONS[selFunnel]}
                  </div>
                )}
              </div>

              <div className="field">
                <label className="label">Format<span className="label-hint"> optional — applies a specific structure to ideas</span></label>
                <select className="input" value={selFormat} onChange={e=>setSelFormat(e.target.value)}>
                  <option value="">No specific format</option>
                  {availableFormats.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
                </select>
              </div>

              <div className="field" style={{marginBottom:0}}>
                <label className="label">Steer the ideas<span className="label-hint"> optional — any specific territory or theme</span></label>
                <textarea className="input" rows={2} value={steerInput} onChange={e=>setSteerInput(e.target.value)} placeholder="e.g. something around logistics businesses, or the chaos of scaling without systems..."/>
              </div>

              {hypotheses.length>0&&(
                <div className="info-box green" style={{marginTop:12}}>
                  <div style={{fontSize:12,color:'var(--green)',fontWeight:700,marginBottom:3}}>{hypotheses.length} validated hypothesis{hypotheses.length>1?'es':''} active</div>
                  <div style={{fontSize:12,color:'var(--green)',lineHeight:1.5}}>Ideas will be scored against your validated research findings.</div>
                </div>
              )}

              <div style={{display:'flex',justifyContent:'flex-end',marginTop:16}}>
                <button className="btn btn-primary" onClick={generateIdeas} disabled={loading||!selFunnel} style={{minWidth:140,justifyContent:'center',opacity:!selFunnel?0.5:1}}>
                  {loading?<><span className="lci-spinner"/> Generating...</>:'Generate Ideas'}
                </button>
              </div>
            </div>
          </div>

          {ideas.length>0&&(
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
                <div style={{fontSize:12.5,color:'var(--text3)'}}>{ideas.length} idea{ideas.length!==1?'s':''} ready. Click Take to Studio to start writing.</div>
                <button className="btn btn-ghost btn-sm" onClick={()=>sync([],history)}>Clear all</button>
              </div>
              {[...ideas].sort((a,b)=>(b.viralScore||0)-(a.viralScore||0)).map(idea=>(
                <div key={idea.id} className="idea-card">
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13.5,fontWeight:600,lineHeight:1.5,marginBottom:8}}>{idea.hook}</div>
                      <div style={{fontSize:12,color:'var(--text3)',lineHeight:1.55,marginBottom:10}}>{idea.angle}</div>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:8}}>
                        {idea.funnelStage&&<FunnelBadge stage={idea.funnelStage}/>}
                        {idea.formatName&&idea.formatName!=='Open format'&&<span style={{fontSize:11,background:'var(--bg3)',color:'var(--text3)',padding:'2px 8px',borderRadius:20,border:'1px solid var(--border)'}}>{idea.formatName}</span>}
                        {idea.viralScore&&<Stars score={idea.viralScore}/>}
                      </div>
                      {idea.scoreReason&&<div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',lineHeight:1.5}}>{idea.scoreReason}</div>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
                      <button className="btn btn-primary btn-sm" onClick={()=>{onSendToStudio(idea);const ni=ideas.filter(i=>i.id!==idea.id);const nh=[idea,...history].slice(0,50);sync(ni,nh);showToast('Idea sent to Post Studio');}}>Take to Studio</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>sync(ideas.filter(i=>i.id!==idea.id),history)}>Discard</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {entryMode==='custom' && (
        <div>
          <div className="card">
            <div className="card-header"><div><div className="card-title">My Own Idea</div><div className="card-sub">Take any rough idea directly to the Post Studio</div></div></div>
            <div className="card-body">
              <div className="field"><label className="label">Your idea</label><textarea className="input" rows={4} value={customIdea} onChange={e=>setCustomIdea(e.target.value)} placeholder="Describe the post you want to write. Can be rough — a single sentence, a topic, a specific angle, or a conversation you want to share..."/></div>
              <div className="grid-2">
                <div className="field" style={{marginBottom:0}}>
                  <label className="label">Funnel stage<span className="label-hint"> optional</span></label>
                  <select className="input" value={customFunnel} onChange={e=>setCustomFunnel(e.target.value)}>
                    <option value="">Skip</option>
                    {FUNNEL_STAGES.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
                  </select>
                </div>
                <div className="field" style={{marginBottom:0}}>
                  <label className="label">Format<span className="label-hint"> optional</span></label>
                  <select className="input" value={customFormat} onChange={e=>setCustomFormat(e.target.value)}>
                    <option value="">No specific format</option>
                    {availableFormats.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'flex-end',marginTop:14}}>
                <button className="btn btn-primary" onClick={handleCustomSend} disabled={!customIdea.trim()} style={{minWidth:140,justifyContent:'center',opacity:!customIdea.trim()?0.5:1}}>Take to Studio</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {entryMode==='history' && (
        <div>
          <div style={{fontSize:12.5,color:'var(--text3)',marginBottom:16,lineHeight:1.6}}>Ideas that have been taken to studio. Up to 50 are kept here.</div>
          {history.length===0
            ? <div style={{textAlign:'center',padding:'48px',color:'var(--text3)',fontSize:12.5,background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)'}}>No history yet. Ideas move here when you take them to the studio.</div>
            : history.map(idea=>(
              <div key={idea.id} className="idea-card" style={{opacity:.85}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,lineHeight:1.5,marginBottom:6}}>{idea.hook}</div>
                    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:6}}>
                      {idea.funnelStage&&<FunnelBadge stage={idea.funnelStage}/>}
                      {idea.formatName&&idea.formatName!=='Open format'&&<span style={{fontSize:11,background:'var(--bg3)',color:'var(--text3)',padding:'2px 8px',borderRadius:20,border:'1px solid var(--border)'}}>{idea.formatName}</span>}
                      {idea.viralScore&&<Stars score={idea.viralScore}/>}
                      {idea.custom&&<span style={{fontSize:11,color:'var(--green)',background:'var(--green-dim)',padding:'2px 8px',borderRadius:20}}>Custom</span>}
                    </div>
                    {idea.createdAt&&<div style={{fontSize:11,color:'var(--text3)'}}>{new Date(idea.createdAt).toLocaleDateString()}</div>}
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
                    <button className="btn btn-primary btn-sm" onClick={()=>{const nh=history.filter(h=>h.id!==idea.id);setHistory(nh);onChange({ideas,history:nh,pendingIdea:ideation.pendingIdea});onSendToStudio(idea);showToast('Idea sent to Post Studio');}}>Take to Studio</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>{const nh=history.filter(h=>h.id!==idea.id);setHistory(nh);onChange({ideas,history:nh,pendingIdea:ideation.pendingIdea});}}>Remove</button>
                  </div>
                </div>
              </div>
            ))
          }
          {history.length>0&&<div style={{display:'flex',justifyContent:'flex-end',marginTop:8}}><button className="btn btn-danger btn-sm" onClick={()=>{setHistory([]);onChange({ideas,history:[],pendingIdea:ideation.pendingIdea});}}>Clear history</button></div>}
        </div>
      )}
    </div>
  );
}

/* ── CALENDAR VIEW (used by Post Studio's Content Calendar tab) ── */
function CalendarView({savedPosts, calendar, buckets, onAssign, onRemove, DAYS, SLOTS}) {
  const postById = (id) => savedPosts.find(p=>p.id===id);

  if (savedPosts.length === 0) {
    return (
      <div style={{textAlign:'center',padding:'56px',color:'var(--text3)',fontSize:12.5,background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)'}}>
        Save a draft first, then come back here to schedule it into your week.
      </div>
    );
  }

  return (
    <div className="g3">
      {DAYS.map(day => (
        <div key={day} className="card">
          <div className="card-header"><div className="card-title">{day}</div></div>
          <div className="card-body">
            {SLOTS.map((slot,i) => {
              const key = `${day}-${slot}`;
              const postId = calendar[key];
              const post = postId ? postById(postId) : null;
              return (
                <div key={slot} style={{padding: i===0 ? '0 0 12px' : '12px 0', borderTop: i>0 ? '1px solid var(--border)' : 'none'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:8}}>
                    <span style={{fontSize:10.5,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px'}}>{slot}</span>
                    {post && <button className="btn btn-ghost btn-sm" style={{padding:'3px 9px',fontSize:10.5}} onClick={()=>onRemove(day,slot)}>Clear</button>}
                  </div>
                  {post ? (
                    <div>
                      <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>{post.bucket && <BucketTag buckets={buckets} name={post.bucket}/>}</div>
                      <div style={{fontSize:12,color:'var(--text)',lineHeight:1.55,whiteSpace:'pre-wrap',maxHeight:66,overflow:'hidden'}}>{post.content}</div>
                    </div>
                  ) : (
                    <select className="input" value="" onChange={e=>{ if(e.target.value) onAssign(Number(e.target.value), day, slot); }}>
                      <option value="">+ Assign a saved draft…</option>
                      {savedPosts.map(p=>(
                        <option key={p.id} value={p.id}>{(p.content||'').slice(0,40).replace(/\n/g,' ')}{(p.content||'').length>40?'…':''}</option>
                      ))}
                    </select>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function PostStudioRoom({ studio, profile, research, strategy, onChange, onSaveToLog, showToast, apiKey, backupKeys=[], model }) {
  const [tab, setTab] = useState('write');
  const [inputMode, setInputMode] = useState('');
  const [selBucket, setSelBucket] = useState('');
  const [selFunnel, setSelFunnel] = useState('');
  const [selFormat, setSelFormat] = useState('');
  const [selStyle, setSelStyle] = useState('conversational');
  const [selLength, setSelLength] = useState('medium');
  const [rawInput, setRawInput] = useState('');
  const [researchCtx, setResearchCtx] = useState('');
  const [loadingG, setLoadingG] = useState(false);
  const [generatedPost, setGeneratedPost] = useState('');
  const [hooks, setHooks] = useState([]);
  const [selHook, setSelHook] = useState('');
  const [customHook, setCustomHook] = useState('');
  const [useSignature, setUseSignature] = useState(false);
  const [savedPosts, setSavedPosts] = useState(studio.savedPosts||[]);
  const [calendar, setCalendar] = useState(studio.calendar||{});
  const [copied, setCopied] = useState(false);
  const [showManual, setShowManual] = useState(false);
  const [manualContent, setManualContent] = useState('');
  const [manualBucket, setManualBucket] = useState('');
  const signature = profile.signature || '';
  const pending = studio.pendingIdea;
  const buckets = (profile.buckets && profile.buckets.length) ? profile.buckets : DEFAULT_BUCKETS;
  const lib = research.formatsLibrary||[];
  const availableFormats = lib.filter(f=>(research.selectedFormats||[]).includes(f.id));
  const STYLES = ['conversational','analytical','storytelling','punchy'];
  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const SLOTS = ['Morning','Afternoon','Evening'];
  const FUNNEL_STAGES = [
    { id:'awareness',     label:'Awareness',     desc: strategy?.funnelAwareness     || 'Broad and relatable. Speaks to anyone in business. No assumed knowledge. Hook them on a universal problem or observation.' },
    { id:'education',     label:'Education',     desc: strategy?.funnelEducation     || 'Teach one specific useful thing. A framework, concept, or process the reader can actually use. Concrete and practical.' },
    { id:'consideration', label:'Consideration', desc: strategy?.funnelConsideration || 'POV content. What you stand for, what makes your approach different. Challenge a common belief or surface your philosophy.' },
    { id:'conversion',    label:'Conversion',    desc: strategy?.funnelConversion    || 'Transformation and proof. Before and after. Specific outcomes. A warm reader should feel this was written for them.' },
  ];

  useEffect(() => {
    if(pending && pending.id){
      setSelBucket(pending.bucket||'');
      setSelFunnel(pending.funnelStage||'');
      setSelFormat(pending.formatId||'');
      setTab('write'); setInputMode(''); setGeneratedPost(''); setHooks([]); setSelHook('');
    }
  }, [pending?.id]);

  const sync = (updates={}) => onChange({savedPosts,calendar,pendingIdea:studio.pendingIdea,...updates});

  const getFormatGuide = () => {
    const fmt = availableFormats.find(f=>f.id===selFormat);
    if(!fmt) return '';
    return `Format: ${fmt.name}\nStructure: ${fmt.structure}\nBody: ${fmt.body||''}\nClosing: ${fmt.closing||''}`;
  };

  const generatePost = async () => {
    if(!apiKey){showToast('Add API key in Settings','!');return;}
    setLoadingG(true);
    try {
      const fmt = availableFormats.find(f=>f.id===selFormat);
      const funnel = FUNNEL_STAGES.find(f=>f.id===selFunnel);
      const activeHook = selHook || customHook;
      const sampleText = (profile.writingSamples||[]).slice(0,2).map((s,i)=>`Sample ${i+1}:\n${(s.text||s).slice(0,500)}`).join('\n\n');
      const prompt = `You are a LinkedIn ghostwriter writing in the voice of a specific person.

PROFILE:
Name: ${profile.name||'Ehijele David'}
Role: ${profile.role||'Data analyst, Decision Intelligence Systems'}
Value proposition: ${profile.valueProp||''}
Offer: ${profile.offer||''}
Audience: ${profile.targetAudience||'Business owners and operators'}
Context: ${profile.currentContext||''}
Voice: ${profile.voiceTone||'Curious, conversational, practical. Not corporate. Not performative.'}
Personal traits: ${profile.personalTraits||''}
AVOID: ${profile.avoidList||'em dashes, leverage, synergy, actionable'} and no em dashes anywhere
${sampleText?`\nWRITING SAMPLES (match this voice exactly):\n${sampleText}`:''}

${pending?`CORE BRIEF:\nPost direction: ${pending.hook}\nWhy this resonates: ${pending.angle||''}`:''}

${funnel?`FUNNEL STAGE: ${funnel.label}\nWhat this post must do: ${funnel.desc}\nEvery choice about language, breadth, and tone must serve this intent.`:''}

WRITING STYLE: ${selStyle}
${fmt?`\nFORMAT TO FOLLOW:\n${getFormatGuide()}`:''}
${activeHook?`\nOPENING LINE TO USE (start with this exact line): "${activeHook}"`:''}
${inputMode==='raw'&&rawInput?`\nUSER NOTES AND EXPERIENCE (use as raw material):\n${rawInput}`:''}
${inputMode==='research'&&researchCtx?`\nRESEARCH CONTEXT:\n${researchCtx}`:''}

POST LENGTH: ${selLength==='very short'?'Under 100 words. One idea, nothing else.':selLength === 'short'? '100 to 150 words. Concise but developed.':selLength==='medium'?'150 to 220 words. One developed thought.':'250 to 350 words. Multiple points or a full story arc.'}

Rules: No em dashes. No hashtags. No "I am excited to share". First person. Match the voice. Return only the post text.`;
      const {text:result} = await lciCallGemini(apiKey, model, prompt, backupKeys);
      setGeneratedPost(result.replace(/```/g,'').trim());
      showToast('Post generated');
    } catch(e){ showToast('Generation failed — check API key','x'); }
    setLoadingG(false);
  };

  const generateHooks = async () => {
    if(!apiKey){showToast('Add API key in Settings','!');return;}
    setLoadingG(true);
    try {
      const fmt=availableFormats.find(f=>f.id===selFormat);
      const prompt=`Generate 3 strong LinkedIn opening lines for a post.\n${selFunnel?`Funnel stage: ${selFunnel}\n`:''}${fmt?`Format: ${fmt.name}\nExample hooks from format: ${(fmt.hooks||[]).join(' | ')}`:''}${pending?`\nPost idea: ${pending.hook}`:''}\nRole: ${profile.role||'Data analyst'}\nAudience: ${profile.targetAudience||'Business owners'}\nVoice: ${profile.voiceTone||'Genuine, practical, conversational'}\nReturn ONLY a JSON array of 3 strings. Each is a complete opening line. No em dashes.`;
      const {text:raw}=await lciCallGemini(apiKey,model,prompt,backupKeys);
      setHooks(JSON.parse(raw.replace(/```json|```/g,'').trim()));
      showToast('Hooks generated');
    } catch(e){ showToast('Could not generate hooks','x'); }
    setLoadingG(false);
  };

  const finalPost = () => { let p=generatedPost; if(useSignature&&signature.trim()) p=p+'\n\n'+signature.trim(); return p; };

  const copyPost = () => { navigator.clipboard.writeText(finalPost()).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); }); };

  const savePost = () => {
    if(!generatedPost.trim()){showToast('Nothing to save yet','!');return;}
    const post={id:Date.now(),content:finalPost(),bucket:selFunnel,formatName:availableFormats.find(f=>f.id===selFormat)?.name||'Open format',style:selStyle,idea:pending?.hook||'',savedAt:new Date().toISOString(),status:'draft'};
    const u=[post,...savedPosts]; setSavedPosts(u); sync({savedPosts:u,calendar}); showToast('Post saved to drafts');
  };

  const deletePost = (id) => { const u=savedPosts.filter(p=>p.id!==id); setSavedPosts(u); sync({savedPosts:u,calendar}); showToast('Post removed'); };

  const assignToSlot = (postId, day, slot) => {
    const key = `${day}-${slot}`;
    const nc = {...calendar};
    // Remove any existing assignment of this post to another slot
    const ex = Object.entries(nc).find(([k,v])=>v===postId&&k!==key);
    if(ex) delete nc[ex[0]];
    nc[key] = postId;
    setCalendar(nc); sync({savedPosts,calendar:nc});
  };
  const removeFromSlot = (day, slot) => {
    const key = `${day}-${slot}`;
    const nc = {...calendar};
    delete nc[key];
    setCalendar(nc); sync({savedPosts,calendar:nc});
  };

  const saveManual = () => {
    if(!manualContent.trim()){showToast('Paste your post content first','!');return;}
    const post={id:Date.now(),content:manualContent.trim(),bucket:manualBucket,formatName:'My own',style:'',idea:'',savedAt:new Date().toISOString(),status:'manual'};
    const u=[post,...savedPosts]; setSavedPosts(u); sync({savedPosts:u,calendar});
    setManualContent(''); setManualBucket(''); setShowManual(false); showToast('Post saved to drafts');
  };

  return (
    <div className="lci-room">
      <div className="tab-nav">
        <button className={`tab-btn ${tab==='write'?'active':''}`} onClick={()=>setTab('write')}>Write Post</button>
        <button className={`tab-btn ${tab==='drafts'?'active':''}`} onClick={()=>setTab('drafts')}>Saved Drafts {savedPosts.length>0&&`(${savedPosts.length})`}</button>
        <button className={`tab-btn ${tab==='calendar'?'active':''}`} onClick={()=>setTab('calendar')}>Content Calendar</button>
      </div>

      {tab==='write' && (
        <div>
          {pending&&<div style={{background:'var(--blue-dim)',border:'1px solid rgba(61,126,255,.3)',borderRadius:10,padding:'13px 16px',marginBottom:16,display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}><div><div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginBottom:4}}>Idea loaded from Ideation</div><div style={{fontSize:12.5,color:'var(--text)',lineHeight:1.6}}>{pending.hook}</div>{pending.angle&&<div style={{fontSize:11.5,color:'var(--blue)',marginTop:4,lineHeight:1.5}}>{pending.angle}</div>}</div><button className="btn btn-ghost btn-sm" onClick={()=>{onChange({...studio,pendingIdea:null});}}>Clear</button></div>}

          <div className="studio-mode-bar">
            <button className={`studio-mode-btn ${inputMode===''?'active':''}`} onClick={()=>setInputMode('')}>Full Generate</button>
            <button className={`studio-mode-btn ${inputMode==='raw'?'active':''}`} onClick={()=>setInputMode('raw')}>Raw Input</button>
            <button className={`studio-mode-btn ${inputMode==='research'?'active':''}`} onClick={()=>setInputMode('research')}>Research + Generate</button>
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div className="card-header"><div><div className="card-title">Post Settings</div></div></div>
            <div className="card-body">
              <div className="grid-2">
                <div className="field" style={{marginBottom:0}}>
                  <label className="label">Funnel stage<span className="label-hint"> optional — shapes the purpose and tone</span></label>
                  <select className="input" value={selFunnel} onChange={e=>setSelFunnel(e.target.value)}>
                    <option value="">No funnel stage</option>
                    {FUNNEL_STAGES.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
                  </select>
                  {selFunnel&&(
                    <div style={{fontSize:10.5,color:'var(--text3)',marginTop:4,lineHeight:1.4,fontStyle:'italic'}}>{FUNNEL_STAGES.find(f=>f.id===selFunnel)?.desc}</div>
                  )}
                </div>
                <div className="field" style={{marginBottom:0}}>
                  <label className="label">Format<span className="label-hint"> optional</span></label>
                  <select className="input" value={selFormat} onChange={e=>setSelFormat(e.target.value)}>
                    <option value="">No specific format</option>
                    {availableFormats.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>
                </div>
              </div>
              <div className="grid-2" style={{marginTop:14}}>
                <div className="field" style={{marginBottom:0}}>
                  <label className="label">Style</label>
                  <select className="input" value={selStyle} onChange={e=>setSelStyle(e.target.value)}>
                    {STYLES.map(s=><option key={s} value={s} style={{textTransform:'capitalize'}}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
                  </select>
                </div>
                <div className="field" style={{marginBottom:0}}>
                  <label className="label">Length</label>
                  <select className="input" value={selLength} onChange={e=>setSelLength(e.target.value)}>
                    <option value="very short">Very Short (under 100 words)</option>
                    <option value="short">Short (100 to 150 words)</option>
                    <option value="medium">Medium (150 to 220 words)</option>
                    <option value="long">Long (250 to 350 words)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          {inputMode==='raw'&&<div className="card" style={{marginBottom:16}}><div className="card-header"><div><div className="card-title">Your Raw Notes</div><div className="card-sub">Paste your actual experience, rough notes, or what you want to say</div></div></div><div className="card-body"><textarea className="input" rows={5} value={rawInput} onChange={e=>setRawInput(e.target.value)} placeholder="Write anything — a rough story, bullet points, a conversation, your opinion. The AI structures and refines it while keeping your voice..."/></div></div>}
          {inputMode==='research'&&<div className="card" style={{marginBottom:16}}><div className="card-header"><div><div className="card-title">Research Context</div><div className="card-sub">Paste research, data, or context to build the post around</div></div></div><div className="card-body"><textarea className="input" rows={5} value={researchCtx} onChange={e=>setResearchCtx(e.target.value)} placeholder="Paste any research, statistics, case study details, or background context you want the post to draw from..."/></div></div>}

          {/* Hooks section */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-header">
              <div><div className="card-title">Hook Editor</div><div className="card-sub">Choose or write the opening line of your post</div></div>
              <button className="btn btn-ghost btn-sm" onClick={generateHooks} disabled={loadingG}>{loadingG?<><span className="lci-spinner"/> Loading...</>:'Generate Hooks'}</button>
            </div>
            <div className="card-body">
              {/* Format hooks - preloaded from selected format */}
              {availableFormats.find(f=>f.id===selFormat)?.hooks?.length>0 && (
                <div style={{marginBottom:hooks.length?14:0}}>
                  {availableFormats.find(f=>f.id===selFormat).hooks.map((h,i)=>(
                    <div key={i} className={`hook-option${selHook===h?' selected':''}`} onClick={()=>setSelHook(selHook===h?'':h)}>
                      <span style={{fontSize:10,fontWeight:700,color:'var(--blue)',background:'var(--blue-dim)',padding:'1px 6px',borderRadius:4,marginRight:8,fontFamily:'var(--font-mono)',letterSpacing:'0.3px'}}>[Format]</span>
                      {h}
                    </div>
                  ))}
                </div>
              )}
              {/* AI generated hooks */}
              {hooks.map((h,i)=>(
                <div key={i} className={`hook-option${selHook===h?' selected':''}`} onClick={()=>setSelHook(selHook===h?'':h)}>
                  <span style={{fontSize:10,fontWeight:700,color:'var(--green)',background:'var(--green-dim)',padding:'1px 6px',borderRadius:4,marginRight:8,fontFamily:'var(--font-mono)',letterSpacing:'0.3px'}}>[AI]</span>
                  {h}
                </div>
              ))}
              <div style={{marginTop:(availableFormats.find(f=>f.id===selFormat)?.hooks?.length||hooks.length)?12:0}}>
                <label className="label">Write your own hook</label>
                <input className="input" value={customHook} onChange={e=>setCustomHook(e.target.value)} placeholder="Write your own opening line..."/>
              </div>
              {signature&&(
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0 0',marginTop:8,borderTop:'1px solid var(--border)'}}>
                  <div>
                    <div style={{fontSize:12.5,fontWeight:500,color:'var(--text)'}}>Add signature</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{signature.slice(0,60)}{signature.length>60?'...':''}</div>
                  </div>
                  <label style={{position:'relative',width:40,height:22,flexShrink:0,cursor:'pointer'}}>
                    <input type="checkbox" style={{opacity:0,width:0,height:0,position:'absolute'}} checked={useSignature} onChange={e=>setUseSignature(e.target.checked)}/>
                    <span style={{position:'absolute',inset:0,background:useSignature?'var(--blue)':'var(--border2)',borderRadius:11,transition:'.2s'}}>
                      <span style={{position:'absolute',width:16,height:16,left:useSignature?21:3,top:3,background:'#fff',borderRadius:'50%',transition:'.2s',boxShadow:'0 1px 3px rgba(0,0,0,.3)'}}/>
                    </span>
                  </label>
                </div>
              )}
            </div>
          </div>

          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
            <button className="btn btn-primary" onClick={generatePost} disabled={loadingG} style={{minWidth:160,justifyContent:'center'}}>
              {loadingG?<><span className="lci-spinner"/> Generating...</>:'Generate Post'}
            </button>
          </div>

          {generatedPost&&(
            <div className="card">
              <div className="card-header">
                <div><div className="card-title">Generated Post</div><div className="card-sub">Edit directly before saving</div></div>
                <div style={{display:'flex',gap:7}}>
                  <button className="btn btn-ghost btn-sm" onClick={savePost}>Save draft</button>
                  <button className="btn btn-green btn-sm" onClick={copyPost}>{copied?'Copied!':'Copy post'}</button>
                </div>
              </div>
              <div className="card-body">
                <textarea
                  className="input"
                  rows={10}
                  value={generatedPost}
                  onChange={e=>setGeneratedPost(e.target.value)}
                  style={{fontFamily:'var(--font-body)',fontSize:13.5,lineHeight:1.8,resize:'vertical'}}
                />
                <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setGeneratedPost('')}>Clear</button>
                  {onSaveToLog&&<button className="btn btn-ghost btn-sm" onClick={()=>onSaveToLog({content:finalPost(),bucket:selFunnel,formatName:availableFormats.find(f=>f.id===selFormat)?.name||'',style:selStyle})}>Send to Log</button>}
                </div>
              </div>
            </div>
          )}

          {/* Manual save section */}
          <div style={{marginTop:16}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowManual(s=>!s)}>{showManual?'Cancel':'+ Save a post I wrote myself'}</button>
            {showManual&&(
              <div className="card" style={{marginTop:10}}>
                <div className="card-header"><div><div className="card-title">Save Manual Post</div><div className="card-sub">Paste any post you wrote outside this tool</div></div></div>
                <div className="card-body">
                  <div className="field"><label className="label">Post content</label><textarea className="input" rows={5} value={manualContent} onChange={e=>setManualContent(e.target.value)} placeholder="Paste the post you wrote..."/></div>
                  <div className="field" style={{marginBottom:0}}><label className="label">Bucket<span className="label-hint"> optional</span></label><select className="input" value={manualBucket} onChange={e=>setManualBucket(e.target.value)}><option value="">Select a bucket...</option>{buckets.map(b=><option key={b.id} value={b.name}>{b.name}</option>)}</select></div>
                  <button className="btn btn-primary" style={{marginTop:14}} onClick={saveManual}>Save to drafts</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {tab==='drafts' && (
        <div>
          {savedPosts.length===0?<div style={{textAlign:'center',padding:'56px',color:'var(--text3)',fontSize:12.5,background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)'}}>No saved drafts yet. Generate a post and save it or save a post you wrote manually.</div>:
          savedPosts.map(p=>(
            <div key={p.id} className="saved-post-card">
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:10,flexWrap:'wrap'}}>
                <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
                  {p.bucket&&<BucketTag buckets={buckets} name={p.bucket}/>}
                  {p.formatName&&<span style={{fontSize:11,background:'var(--bg3)',color:'var(--text3)',padding:'2px 8px',borderRadius:20,border:'1px solid var(--border)'}}>{p.formatName}</span>}
                  {p.status&&<span style={{fontSize:10.5,background:p.status==='manual'?'var(--green-dim)':'var(--blue-dim)',color:p.status==='manual'?'var(--green)':'var(--blue)',padding:'2px 8px',borderRadius:20}}>{p.status}</span>}
                </div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{p.savedAt?new Date(p.savedAt).toLocaleDateString():''}</div>
              </div>
              <div style={{fontSize:12.5,color:'var(--text)',lineHeight:1.7,marginBottom:10,whiteSpace:'pre-wrap',maxHeight:120,overflow:'hidden'}}>{p.content}</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>{ navigator.clipboard.writeText(p.content); showToast('Copied!'); }}>Copy</button>
                {onSaveToLog&&<button className="btn btn-ghost btn-sm" onClick={()=>onSaveToLog({content:p.content,bucket:p.bucket,formatName:p.formatName,style:p.style,studioId:p.id})}>Send to Log</button>}
                <button className="btn btn-danger btn-sm" onClick={()=>deletePost(p.id)}>Delete</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==='calendar' && (
        <div>
          <CalendarView savedPosts={savedPosts} calendar={calendar} buckets={buckets}
            onAssign={assignToSlot} onRemove={removeFromSlot}
            DAYS={DAYS} SLOTS={SLOTS}/>
        </div>
      )}
    </div>
  );
}

/* ── PERFORMANCE LOG ROOM ── */
function PerformanceLogRoom({ log, studio, research, onChange, showToast }) {
  const [tab, setTab] = useState('entries');
  const [entries, setEntries] = useState(log.entries||[]);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({content:'',bucket:'',formatName:'',style:'',postedAt:'',dayOfWeek:'',reach:0,likes:0,comments:0,shares:0,saves:0,notes:'',source:'manual'});
  const savedPosts = studio.savedPosts||[];
  const hypotheses = (research.hypotheses||[]).filter(h=>h.validated);
  const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const sync = (e) => { setEntries(e); onChange({entries:e}); };
  const scoreE = (e) => (e.likes||0)+(e.comments||0)*3+(e.shares||0)*4+(e.saves||0)*3;
  const gradeE = (entry, all) => {
    if(all.length<2)return'ungraded';
    const scores=all.map(e=>scoreE(e));
    const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
    const s=scoreE(entry);
    if(s>=avg*1.5)return'gold';
    if(s>=avg*0.7)return'silver';
    return'bronze';
  };
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const openForm=(post=null)=>{
    if(post){setForm({content:post.content||'',bucket:post.bucket||'',formatName:post.formatName||'',style:post.style||'',postedAt:new Date().toISOString().slice(0,10),dayOfWeek:DAYS[new Date().getDay()-1]||'Monday',reach:0,likes:0,comments:0,shares:0,saves:0,notes:'',source:'studio',studioId:post.id});}
    else{setForm({content:'',bucket:'',formatName:'',style:'',postedAt:new Date().toISOString().slice(0,10),dayOfWeek:DAYS[new Date().getDay()-1]||'Monday',reach:0,likes:0,comments:0,shares:0,saves:0,notes:'',source:'manual'});}
    setEditId(null);setShowForm(true);
  };
  const openEdit=(entry)=>{setForm({...entry});setEditId(entry.id);setShowForm(true);};
  const saveEntry=()=>{
    if(!form.content.trim()&&!form.bucket){showToast('Add some post details first','!');return;}
    if(editId){sync(entries.map(e=>e.id===editId?{...form,id:editId}:e));showToast('Entry updated');}
    else{sync([{...form,id:Date.now(),loggedAt:new Date().toISOString()},...entries]);showToast('Post logged');}
    setShowForm(false);setEditId(null);setTab('entries');
  };
  const deleteEntry=(id)=>{if(!window.confirm('Remove this log entry?'))return;sync(entries.filter(e=>e.id!==id));showToast('Entry removed');};
  const totalPosts=entries.length;
  const graded=entries.map(e=>gradeE(e,entries));
  const goldCount=graded.filter(g=>g==='gold').length;
  const silverCount=graded.filter(g=>g==='silver').length;
  const avgScore=totalPosts>0?Math.round(entries.reduce((a,e)=>a+scoreE(e),0)/totalPosts):0;
  const bucketStats={};
  entries.forEach(e=>{if(!e.bucket)return;if(!bucketStats[e.bucket])bucketStats[e.bucket]={total:0,gold:0,scores:[]};const g=gradeE(e,entries);bucketStats[e.bucket].total++;if(g==='gold')bucketStats[e.bucket].gold++;bucketStats[e.bucket].scores.push(scoreE(e));});
  const dayStats={};
  entries.forEach(e=>{if(!e.dayOfWeek)return;if(!dayStats[e.dayOfWeek])dayStats[e.dayOfWeek]={total:0,scores:[]};dayStats[e.dayOfWeek].total++;dayStats[e.dayOfWeek].scores.push(scoreE(e));});
  Object.keys(dayStats).forEach(d=>{const s=dayStats[d].scores;dayStats[d].avgScore=Math.round(s.reduce((a,b)=>a+b,0)/s.length);});
  const hypResults=hypotheses.map(h=>{const related=entries.filter(e=>e.notes&&e.notes.toLowerCase().includes(h.text.slice(0,20).toLowerCase()));const goldRelated=related.filter(e=>gradeE(e,entries)==='gold').length;return{...h,relatedCount:related.length,goldRelated,confidence:related.length>0?Math.round(goldRelated/related.length*100):null};});
  const notLoggedPosts=savedPosts.filter(p=>!entries.find(e=>e.studioId===p.id));

  return (
    <div className="lci-room">
      <div className="tab-nav">
        <button className={`tab-btn ${tab==='entries'?'active':''}`} onClick={()=>setTab('entries')}>Post Log {entries.length>0&&`(${entries.length})`}</button>
        <button className={`tab-btn ${tab==='insights'?'active':''}`} onClick={()=>setTab('insights')}>Insights</button>
        <button className={`tab-btn ${tab==='hypotheses'?'active':''}`} onClick={()=>setTab('hypotheses')}>Hypothesis Check</button>
      </div>

      {tab==='entries' && (
        <div>
          {showForm&&(
            <div className="card" style={{marginBottom:16,border:'2px solid var(--blue)'}}>
              <div className="card-header"><div><div className="card-title">{editId?'Edit log entry':'Log a post'}</div><div className="card-sub">Enter post details and results after publishing</div></div><button className="btn btn-ghost btn-sm" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button></div>
              <div className="card-body">
                <div className="field"><label className="label">Post content<span className="label-hint"> paste or type what you posted</span></label><textarea className="input" rows={4} value={form.content} onChange={e=>upd('content',e.target.value)} placeholder="Paste the post you published..."/></div>
                <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                  <div className="field" style={{flex:'1',minWidth:130}}><label className="label">Bucket</label><input className="input" value={form.bucket} onChange={e=>upd('bucket',e.target.value)} placeholder="In The Work"/></div>
                  <div className="field" style={{flex:'1',minWidth:130}}><label className="label">Format used</label><input className="input" value={form.formatName} onChange={e=>upd('formatName',e.target.value)} placeholder="The Before and After"/></div>
                  <div className="field" style={{flex:'1',minWidth:130}}><label className="label">Day posted</label><select className="input" value={form.dayOfWeek} onChange={e=>upd('dayOfWeek',e.target.value)}>{DAYS.map(d=><option key={d}>{d}</option>)}</select></div>
                  <div className="field" style={{flex:'1',minWidth:130}}><label className="label">Date posted</label><input className="input" type="date" value={form.postedAt} onChange={e=>upd('postedAt',e.target.value)}/></div>
                </div>
                <div style={{marginBottom:16}}><label className="label" style={{marginBottom:10}}>Engagement results</label><div style={{display:'flex',gap:10,flexWrap:'wrap'}}>{['reach','likes','comments','shares','saves'].map(k=><div key={k}><div style={{fontSize:10.5,color:'var(--text3)',marginBottom:4,textTransform:'capitalize'}}>{k}</div><input className="eng-input" type="number" min="0" value={form[k]} onChange={e=>upd(k,parseInt(e.target.value)||0)}/></div>)}</div></div>
                <div className="field"><label className="label">Notes<span className="label-hint"> mention which hypothesis you were testing</span></label><textarea className="input" rows={2} value={form.notes} onChange={e=>upd('notes',e.target.value)} placeholder="e.g. Tested opening with a specific number as per hypothesis 1..."/></div>
                <button className="btn btn-primary" onClick={saveEntry}>Save entry</button>
              </div>
            </div>
          )}
          {notLoggedPosts.length>0&&!showForm&&<div className="info-box blue" style={{marginBottom:16}}><div style={{fontSize:12,color:'var(--blue)',fontWeight:700,marginBottom:6}}>{notLoggedPosts.length} saved post{notLoggedPosts.length>1?'s':''} not yet logged</div><div style={{display:'flex',flexDirection:'column',gap:6}}>{notLoggedPosts.slice(0,3).map(p=><div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}><div style={{fontSize:12,color:'var(--blue)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.content.slice(0,60)}...</div><button className="btn btn-primary btn-sm" onClick={()=>openForm(p)}>Log results</button></div>)}</div></div>}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
            <div style={{fontSize:12.5,color:'var(--text3)'}}>{entries.length} post{entries.length!==1?'s':''} logged.</div>
            <button className="btn btn-primary btn-sm" onClick={()=>openForm()}>+ Log a post</button>
          </div>
          {entries.length===0?<div style={{textAlign:'center',padding:'56px',color:'var(--text3)',fontSize:12.5,background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)'}}>No posts logged yet. After you publish on LinkedIn, come back and log the results here.</div>:
          entries.map(entry=>(
            <div key={entry.id} className="log-card">
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:10}}>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                  <GradePill grade={gradeE} entry={entry} all={entries}/>
                  {entry.bucket&&<span style={{fontSize:11,background:'var(--bg3)',color:'var(--text3)',padding:'2px 8px',borderRadius:20,border:'1px solid var(--border)'}}>{entry.bucket}</span>}
                  {entry.formatName&&<span style={{fontSize:11,background:'var(--bg3)',color:'var(--text3)',padding:'2px 8px',borderRadius:20,border:'1px solid var(--border)'}}>{entry.formatName}</span>}
                  {entry.dayOfWeek&&<span style={{fontSize:11,background:'var(--bg3)',color:'var(--text3)',padding:'2px 8px',borderRadius:20,border:'1px solid var(--border)'}}>{entry.dayOfWeek}</span>}
                </div>
                <div style={{fontSize:11,color:'var(--text3)',flexShrink:0}}>{entry.postedAt}</div>
              </div>
              {entry.content&&<div style={{fontSize:12.5,lineHeight:1.7,marginBottom:10,maxHeight:72,overflow:'hidden',color:'var(--text2)'}}>{entry.content}</div>}
              <div style={{display:'flex',gap:14,marginBottom:10,flexWrap:'wrap'}}>{[['Reach',entry.reach],['Likes',entry.likes],['Comments',entry.comments],['Shares',entry.shares],['Saves',entry.saves],['Score',scoreE(entry)]].map(([label,val])=><div key={label} style={{textAlign:'center'}}><div style={{fontSize:14,fontWeight:700,color:label==='Score'?'var(--blue)':'var(--text)'}}>{val||0}</div><div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.3px'}}>{label}</div></div>)}</div>
              {entry.notes&&<div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic',marginBottom:10,lineHeight:1.5}}>{entry.notes}</div>}
              <div style={{display:'flex',gap:6}}><button className="btn btn-ghost btn-sm" onClick={()=>openEdit(entry)}>Edit</button><button className="btn btn-danger btn-sm" onClick={()=>deleteEntry(entry.id)}>Delete</button></div>
            </div>
          ))}
        </div>
      )}

      {tab==='insights' && (
        <div>
          {entries.length<3?<div style={{textAlign:'center',padding:'56px',color:'var(--text3)',fontSize:12.5,background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)'}}>Log at least 3 posts to start seeing patterns. You have {entries.length} so far.</div>:(
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
                {[{num:totalPosts,label:'Posts logged'},{num:goldCount,label:'Gold posts'},{num:silverCount,label:'Silver posts'},{num:avgScore,label:'Avg score'}].map(({num,label})=>(
                  <div key={label} className="stat-box"><div className="stat-num">{num}</div><div className="stat-label">{label}</div></div>
                ))}
              </div>
              {Object.keys(bucketStats).length>0&&<div className="card"><div className="card-header"><div><div className="card-title">Performance by Bucket</div></div></div><div className="card-body">{Object.entries(bucketStats).map(([name,stats])=>{const avgS=Math.round(stats.scores.reduce((a,b)=>a+b,0)/stats.scores.length);const max=Math.max(...Object.values(bucketStats).map(s=>Math.round(s.scores.reduce((a,b)=>a+b,0)/s.scores.length)));return(<div key={name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}}><div style={{fontSize:12.5,fontWeight:600,width:120}}>{name}</div><div style={{flex:1,margin:'0 12px'}}><div style={{height:5,background:'var(--bg3)',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:'var(--blue)',borderRadius:3,width:`${Math.min(100,Math.round(avgS/max*100))}%`,transition:'width .4s'}}/></div></div><div style={{display:'flex',gap:12}}><div style={{textAlign:'center'}}><div style={{fontSize:13,fontWeight:700}}>{avgS}</div><div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase'}}>Avg</div></div><div style={{textAlign:'center'}}><div style={{fontSize:13,fontWeight:700}}>{stats.total}</div><div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase'}}>Posts</div></div><div style={{textAlign:'center'}}><div style={{fontSize:13,fontWeight:700,color:'var(--amber)'}}>{stats.gold}</div><div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase'}}>Gold</div></div></div></div>);})}
              </div></div>}
              {Object.keys(dayStats).length>0&&<div className="card"><div className="card-header"><div><div className="card-title">Performance by Day</div><div className="card-sub">Which days tend to produce the best engagement</div></div></div><div className="card-body">{DAYS.filter(d=>dayStats[d]).map(d=>{const maxAvg=Math.max(...Object.values(dayStats).map(x=>x.avgScore));return(<div key={d} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}}><div style={{fontSize:13,fontWeight:500,width:100}}>{d}</div><div style={{flex:1,margin:'0 12px'}}><div style={{height:5,background:'var(--bg3)',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:'var(--blue)',borderRadius:3,width:`${Math.min(100,Math.round(dayStats[d].avgScore/maxAvg*100))}%`,transition:'width .4s'}}/></div></div><div style={{display:'flex',gap:12}}><div style={{textAlign:'center'}}><div style={{fontSize:13,fontWeight:700}}>{dayStats[d].avgScore}</div><div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase'}}>Avg</div></div><div style={{textAlign:'center'}}><div style={{fontSize:13,fontWeight:700,color:'var(--text2)'}}>{dayStats[d].total}</div><div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase'}}>Posts</div></div></div></div>);})}
              </div></div>}
            </>
          )}
        </div>
      )}

      {tab==='hypotheses' && (
        <div>
          <div style={{fontSize:12.5,color:'var(--text3)',marginBottom:16,lineHeight:1.6}}>This checks your validated hypotheses against your actual post results. Add notes to your log entries mentioning which hypothesis you were testing.</div>
          {hypotheses.length===0?<div style={{textAlign:'center',padding:'56px',color:'var(--text3)',fontSize:12.5,background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)'}}>No validated hypotheses yet. Go to Research Desk and validate hypotheses from the Post Analysis.</div>:
          <div className="card"><div className="card-header"><div><div className="card-title">Hypothesis Tracker</div><div className="card-sub">How your validated research hypotheses are holding up against real results</div></div></div><div className="card-body">{hypResults.map(h=><div key={h.id} className="hyp-check"><div style={{width:9,height:9,borderRadius:'50%',background:h.confidence===null?'var(--border2)':h.confidence>=60?'var(--green)':'var(--amber)',marginTop:3,flexShrink:0}}/><div style={{flex:1}}><div style={{fontSize:12.5,lineHeight:1.6,marginBottom:4}}>{h.text}</div>{h.confidence!==null?<div style={{fontSize:11.5,color:'var(--text3)'}}>Tested {h.relatedCount} time{h.relatedCount!==1?'s':''}. <strong style={{color:h.confidence>=60?'var(--green)':'var(--amber)'}}>{h.confidence}% gold rate</strong> on those posts.</div>:<div style={{fontSize:11.5,color:'var(--text3)'}}>Not yet tested. Mention this hypothesis in your log entry notes to start tracking it.</div>}</div></div>)}</div></div>}
          <div className="info-box blue" style={{marginTop:8}}><div style={{fontSize:12,color:'var(--blue)',fontWeight:700,marginBottom:4}}>How tracking works</div><div style={{fontSize:12,color:'var(--blue)',lineHeight:1.6}}>When you log a post, add a note mentioning which hypothesis you were testing. The tracker matches your notes to hypotheses and shows the gold rate.</div></div>
        </div>
      )}
    </div>
  );
}
