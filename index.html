<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beacon - Personal Brand OS</title>

<!-- Manifest for installable app -->
<link rel="manifest" href="./manifest.json">

<!-- Theme color for browser UI and splash -->
<meta name="theme-color" content="#09101E">

<!-- Favicon (inline SVG) -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 18 18' fill='none' stroke='%233D7EFF' stroke-width='1.8' stroke-linecap='round'%3E%3Ccircle cx='9' cy='9' r='2.5'/%3E%3Cpath d='M9 1v2M9 15v2M1 9h2M15 9h2'/%3E%3Cpath d='M3.5 3.5l1.4 1.4M13.1 13.1l1.4 1.4M13.1 4.9l-1.4 1.4M4.9 13.1l-1.4 1.4' stroke-width='1.4'/%3E%3C/svg%3E">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- React and Babel if you need them -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Service worker registration
     Replace /REPO_NAME/ with your GitHub Pages repo path, for example /focusflow/ -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Beacon/sw.js', { scope: '/Beacon/' })
      .then(() => console.log('Service worker registered'))
      .catch(err => console.error('SW registration failed:', err));
  }
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070B12;--bg2:#0C1220;--bg3:#111827;--surface:#141E30;--surface2:#1A2640;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --blue:#3D7EFF;--blue2:#2563EB;--blue-dim:rgba(61,126,255,0.1);--blue-glow:rgba(61,126,255,0.22);
  --green:#00C896;--green-dim:rgba(0,200,150,0.1);--green-mid:rgba(0,200,150,0.25);
  --amber:#F59E0B;--red:#EF4444;--purple:#8B5CF6;
  --text:#EDF2FF;--text2:#8494B4;--text3:#445270;
  --font-display:'Cabinet Grotesk',sans-serif;
  --font-body:'Instrument Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --r:10px;--r2:14px;--r3:20px;
}
body.light{
  --bg:#F0F3FA;--bg2:#FFFFFF;--bg3:#E8EDF8;--surface:#FFFFFF;--surface2:#F5F8FF;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --blue:#2563EB;--blue2:#1D4ED8;--blue-dim:rgba(37,99,235,0.07);--blue-glow:rgba(37,99,235,0.15);
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;font-size:14px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* HOME */
.home{min-height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}
.home-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(61,126,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(61,126,255,0.035) 1px,transparent 1px);
  background-size:60px 60px}
.home-radial{position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:1000px;height:700px;
  background:radial-gradient(ellipse,rgba(37,99,235,0.14) 0%,transparent 60%);pointer-events:none;z-index:0}
.home-nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:22px 56px;border-bottom:1px solid var(--border)}
.beacon-mark{display:flex;align-items:center;gap:11px}
.beacon-icon{width:34px;height:34px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;position:relative}
.beacon-icon::after{content:'';position:absolute;inset:-3px;border-radius:12px;border:1px solid rgba(61,126,255,0.35)}
.beacon-icon svg{width:18px;height:18px}
.beacon-wordmark{font-family:var(--font-display);font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.beacon-tagline{font-size:10px;color:var(--text3);letter-spacing:0.6px;text-transform:uppercase;margin-top:1px}
.home-hero{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px 60px;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border:1px solid rgba(61,126,255,0.3);border-radius:20px;background:var(--blue-dim);font-size:11px;font-weight:500;color:var(--blue);margin-bottom:28px;letter-spacing:0.3px}
.hero-pulse{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:hpulse 2s infinite}
@keyframes hpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero-h1{font-family:var(--font-display);font-size:clamp(44px,6vw,80px);font-weight:900;letter-spacing:-2.5px;line-height:.95;margin-bottom:22px;max-width:800px}
.hero-accent{color:var(--blue);display:block}
.hero-p{font-size:16px;color:var(--text2);line-height:1.75;max-width:500px;margin:0 auto 42px}
.cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.cta{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:var(--r2);font-size:13.5px;font-weight:600;cursor:pointer;font-family:var(--font-body);border:none;letter-spacing:-.2px;transition:all .2s}
.cta-p{background:var(--blue);color:#fff;box-shadow:0 0 32px var(--blue-glow)}
.cta-p:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 0 44px rgba(61,126,255,.4)}
.cta-s{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.cta-s:hover{background:var(--surface2);border-color:var(--blue)}
.home-rooms{position:relative;z-index:10;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:0 56px 72px;max-width:1200px;margin:0 auto;width:100%}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.room-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--blue-dim),transparent);opacity:0;transition:opacity .2s}
.room-card:hover{border-color:rgba(61,126,255,.35);transform:translateY(-2px);box-shadow:0 8px 28px var(--blue-glow)}
.room-card:hover::before{opacity:1}
.room-icon{font-size:20px;margin-bottom:12px;display:block;position:relative;z-index:1}
.room-name{font-family:var(--font-display);font-size:13px;font-weight:700;margin-bottom:5px;position:relative;z-index:1}
.room-desc{font-size:11.5px;color:var(--text2);line-height:1.55;position:relative;z-index:1}
.room-badge{display:inline-block;font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:6px;margin-top:9px;position:relative;z-index:1}
.rb-new{background:var(--green-dim);color:var(--green);border:1px solid var(--green-mid)}
.rb-old{background:var(--border);color:var(--text3)}
.home-foot{position:relative;z-index:10;padding:16px 56px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.foot-txt{font-size:10px;color:var(--text3);letter-spacing:.4px;text-transform:uppercase}

/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;cursor:pointer}
.sb-icon{width:28px;height:28px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-icon svg{width:15px;height:15px}
.sb-name{font-family:var(--font-display);font-size:13px;font-weight:800;letter-spacing:-.4px}
.sb-ver{font-size:9px;color:var(--text3);letter-spacing:.5px;margin-top:1px}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 0}
.sb-sec{padding:12px 12px 4px;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1.4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 5px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--blue-dim);color:var(--text)}
.nav-item.active{background:var(--blue-dim);color:var(--blue)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .15s}
.nav-item.active .nav-dot{background:var(--blue)}
.nav-new{font-size:8.5px;margin-left:auto;padding:2px 5px;border-radius:5px;font-weight:600;background:var(--green-dim);color:var(--green);border:1px solid var(--green-mid)}
.sb-foot{padding:10px 12px;border-top:1px solid var(--border)}
.key-status{font-family:var(--font-mono);font-size:9.5px;color:var(--text3);display:flex;align-items:center;gap:5px}
.key-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:hpulse 2s infinite;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-family:var(--font-display);font-size:13.5px;font-weight:700}
.tb-sub{font-size:10.5px;color:var(--text3);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:7px}
.icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);transition:all .15s;font-family:var(--font-body)}
.icon-btn:hover{background:var(--surface);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:22px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body);transition:all .15s;letter-spacing:-.1px}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:var(--blue2)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-g:hover{background:var(--surface);color:var(--text)}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-mid)}.btn-green:hover{background:var(--green);color:#000}
.btn-sm{padding:5px 9px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:10px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* FORM */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:var(--font-display);font-size:13px;font-weight:700}
.card-sub{font-size:10.5px;color:var(--text3);margin-top:2px}
.card-bd{padding:18px}
.field{margin-bottom:14px}.field:last-child{margin-bottom:0}
.lbl{font-size:10.5px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:.2px}
.inp{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);font-size:12.5px;font-family:var(--font-body);color:var(--text);background:var(--bg3);outline:none;transition:border .15s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
textarea.inp{resize:vertical;line-height:1.6}
.inp::placeholder{color:var(--text3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

/* TABS */
.tab-bar{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:11px;margin-bottom:16px}
.tab-btn{flex:1;padding:7px 10px;border-radius:8px;border:none;background:transparent;font-size:11.5px;font-weight:600;color:var(--text3);cursor:pointer;font-family:var(--font-body);transition:all .15s;text-align:center}
.tab-btn.act{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* PROGRESS */
.prog-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .4s}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:9px 14px;border-radius:var(--r2);font-size:12px;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.35);animation:tin .2s ease;pointer-events:all}
@keyframes tin{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SECTION HEADING */
.sec-hd{font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}

/* FUNNEL ROWS */
.funnel-row{display:flex;gap:10px;align-items:stretch;margin-bottom:8px}
.funnel-lbl{font-size:11px;font-weight:500;color:var(--text3);width:90px;flex-shrink:0;display:flex;align-items:center}
.funnel-bar{flex:1;border-radius:8px;padding:10px 13px}
.fb-name{font-size:12px;font-weight:600;margin-bottom:3px}
.fb-ex{font-size:11px;opacity:.8;line-height:1.5}
.f-aw{background:rgba(61,126,255,.1);color:#7AA8FF}
.f-ed{background:rgba(0,200,150,.1);color:#00C896}
.f-co{background:rgba(139,92,246,.1);color:#A78BFA}
.f-cv{background:rgba(239,68,68,.1);color:#F87171}

/* PHASE */
.phase-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.phase-name-val{font-size:13px;font-weight:700;color:var(--blue)}
.phase-meta{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text3);margin-top:6px}

/* SLOT GRID */
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.slot{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;transition:border-color .15s}
.slot:hover{border-color:rgba(61,126,255,.3)}
.slot-time{font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.slot-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:9px}
.slot-prompt{font-size:11.5px;color:var(--text2);line-height:1.55;margin-bottom:11px}
.slot-open{width:100%;padding:6px;border-radius:7px;background:var(--blue-dim);color:var(--blue);border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.slot-open:hover{background:var(--blue);color:#fff}

/* D100 */
.d100-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.d100-row:last-child{border-bottom:none}
.d100-av{width:34px;height:34px;border-radius:50%;background:var(--blue-dim);border:1px solid rgba(61,126,255,.2);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--blue);flex-shrink:0}
.d100-name{font-size:12.5px;font-weight:500}
.d100-why{font-size:10.5px;color:var(--text3);margin-top:2px}
.d100-link{font-size:10.5px;font-weight:600;color:var(--blue);text-decoration:none;padding:4px 10px;border-radius:6px;background:var(--blue-dim);border:1px solid rgba(61,126,255,.2);flex-shrink:0;transition:all .15s}
.d100-link:hover{background:var(--blue);color:#fff}

/* SIGNAL */
.signal{background:linear-gradient(135deg,rgba(61,126,255,.07),rgba(139,92,246,.05));border:1px solid rgba(61,126,255,.15);border-radius:var(--r2);padding:14px;display:flex;gap:11px;align-items:flex-start}
.signal-ic{width:34px;height:34px;border-radius:8px;background:var(--blue-dim);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.signal-title{font-size:12.5px;font-weight:600;margin-bottom:3px}
.signal-desc{font-size:11.5px;color:var(--text2);line-height:1.55}

/* IP VAULT */
.ip-row{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border)}
.ip-row:last-child{border-bottom:none}
.ip-term{font-size:12.5px;font-weight:700;color:var(--blue);min-width:130px;flex-shrink:0}
.ip-def{font-size:12px;color:var(--text2);line-height:1.55;flex:1}

/* PROOF */
.proof-tier{border-left:2px solid var(--blue);padding:12px 15px;background:var(--surface);border-radius:0 10px 10px 0;margin-bottom:10px}
.proof-tier-title{font-size:13px;font-weight:600;margin-bottom:4px}
.proof-tier-desc{font-size:12px;color:var(--text2);line-height:1.55}
.proof-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.proof-card-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.proof-type{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px}
.pt-t{background:rgba(61,126,255,.1);color:#7AA8FF}
.pt-c{background:rgba(0,200,150,.1);color:#00C896}
.pt-l{background:rgba(245,158,11,.1);color:#FCD34D}
.proof-text{font-size:12.5px;line-height:1.65;margin-bottom:8px}
.proof-source{font-size:10.5px;color:var(--text3)}
.ai-insight-area{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-top:10px;font-size:12px;color:var(--text2);line-height:1.65;white-space:pre-wrap}

/* DROPIN STYLES */
.dropin-engine-hd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px;margin-bottom:12px}
.dropin-stats{display:flex;gap:14px;font-size:10.5px;font-family:var(--font-mono);color:var(--text3);margin-top:6px}
.dropin-stat-done{color:var(--green)}
.dropin-stat-fail{color:var(--red)}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:10px;transition:border-color .2s}
.post-card.s-done{border-color:var(--green-mid)}
.post-card.s-busy{border-color:rgba(245,158,11,.35)}
.post-card.s-failed{border-color:rgba(239,68,68,.35)}
.pc-hd{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;transition:background .15s}
.pc-hd:hover{background:var(--bg3)}
.pc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--border2)}
.s-done .pc-dot{background:var(--green)}
.s-busy .pc-dot{background:var(--amber);animation:hpulse 1s infinite}
.s-failed .pc-dot{background:var(--red)}
.pc-meta{flex:1;min-width:0}
.pc-preview{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-author{font-size:10.5px;color:var(--text3);margin-top:2px}
.pc-body{display:none;border-top:1px solid var(--border)}
.pc-body.open{display:block}
.pc-text{padding:11px 14px;background:var(--bg3);font-size:12px;color:var(--text2);line-height:1.7;max-height:90px;overflow-y:auto}
.variations{padding:12px 14px;display:flex;flex-direction:column;gap:7px}
.variation{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;transition:border-color .15s}
.variation:hover{border-color:var(--border2)}
.var-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.var-label{font-size:9.5px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.8px;font-family:var(--font-mono)}
.var-text{font-size:12.5px;line-height:1.7}
.copy-btn{font-size:9.5px;padding:3px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-body);font-weight:600;transition:all .15s}
.copy-btn:hover{border-color:var(--green);color:var(--green)}
.copy-btn.copied{border-color:var(--green);color:var(--green);background:var(--green-dim)}

/* ── UTILS ── */
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = (msg, type='ok') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 2800);
  };
  return [toasts, push];
}

function Toasts({items}) {
  const colors = {ok:'var(--green)', err:'var(--red)', info:'var(--blue)'};
  return <div className="toast-wrap">{items.map(t=><div className="toast" key={t.id}><span style={{color:colors[t.type]||colors.ok,fontWeight:700}}>✓</span>{t.msg}</div>)}</div>;
}

function CopyBtn({text}) {
  const [copied,setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(text).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),1500); }); };
  return <button className={`copy-btn${copied?' copied':''}`} onClick={copy}>{copied?'Copied!':'Copy'}</button>;
}

    if(slot==='morning') { if(d.awareness>=50) return 'awareness'; if(d.education>=30) return 'education'; return 'consideration'; }

    if(r<d.conversion) return 'conversion';

  const TYPE_MAP = {transform:'Transformation',component:'Component Proof',live:'Live Case Study'};
  const TYPE_CLS = {transform:'pt-t',component:'pt-c',live:'pt-l'};

  // Resolve type label — check tiers first, then fallback to hardcoded map
  const getTierLabel = (type) => {
    if(tiers && tiers.length>0) {
      const t = tiers.find(x=>String(x.id)===String(type));
      if(t) return t.title.replace(/^Tier \d+ — /,'');
    }
    return TYPE_MAP[type]||type;
  };
  const getTierClass = (type) => {
    const classes = ['pt-t','pt-c','pt-l'];
    if(tiers && tiers.length>0) {
      const idx = tiers.findIndex(x=>String(x.id)===String(type));
      return idx>=0 ? (classes[idx%classes.length]||'pt-t') : 'pt-t';
    }
    return TYPE_CLS[type]||'pt-t';
  };

  const upd = (k,v) => setDraft(d=>({...d,[k]:v}));

  return (
    <div className="proof-card" style={{border:`1px solid ${editing?'var(--blue)':'var(--border)'}`}}>
      {editing ? (
        <div>
          <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>

              <div className="lbl" style={{fontSize:10.5,fontWeight:600,color:'var(--text2)',marginBottom:5}}>Type</div>
              <select className="inp" value={draft.type} onChange={ev=>upd('type',ev.target.value)}>
                {tiers && tiers.length>0
                  ? tiers.map(t=><option key={t.id} value={String(t.id)}>{t.title.replace(/^Tier \d+ — /,'')}</option>)
                  : <>
                      <option value="transform">Transformation language</option>
                      <option value="component">Component proof</option>
                      <option value="live">Live case study</option>
                    </>
                }
              </select>
            </div>
            <div style={{width:80}}>
              <div className="lbl" style={{fontSize:10.5,fontWeight:600,color:'var(--text2)',marginBottom:5}}>Year</div>
              <input className="inp" value={draft.date} onChange={ev=>upd('date',ev.target.value)}/>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <div className="lbl" style={{fontSize:10.5,fontWeight:600,color:'var(--text2)',marginBottom:5}}>The proof</div>
            <textarea className="inp" rows={5} value={draft.text} onChange={ev=>upd('text',ev.target.value)} style={{lineHeight:1.7}}/>

const DROPIN_DEFAULT_SP = `You are a comment intelligence engine inside a tool called Dropin. You generate casual, human LinkedIn comments on behalf of Ehijele David, a data analyst and business intelligence practitioner with a background in finance. Your job is to write comments that sound like a real person who actually read the post, thought about it, and had something worth saying.

WHO YOU ARE WRITING FOR
Name: Ehijele David. He is curious, systems-minded, direct, and warm without being performative. He thinks in structures but talks like a human. He comes from finance and accounting, which means he reads business problems through the lens of operations, numbers, and outcomes. He is building his presence on LinkedIn by engaging genuinely with founders, operators, CEOs, and decision makers across business, finance, and operations. He does not sound corporate. He does not use words like leverage, synergy, actionable, or game-changer. He never uses em dashes.

THE GOAL OF EVERY COMMENT
Start or extend a real conversation. Add something the post did not say. Pull one thread and go deeper on it. A comment that makes the author feel genuinely seen will always outperform one that flatters them.

COMMENT ANGLES TO ROTATE
Thread pull: Pick one specific thing from the post and go one layer deeper on it.
Affirm and extend: Agree with the core idea but add a layer the post did not cover.
Gentle challenge: Respectfully push back on one assumption. Frame it as your experience or observation.
Personal connection: Connect the post idea briefly to something real from your own experience or thinking.

RULES THAT NEVER CHANGE
Keep comments between 20 and 80 words. Shorter is almost always better.
Never open with Great post, This is so true, Love this, or any generic praise. Open with the actual thought.
Never pitch, promote, or make the comment about services.
No em dashes anywhere. No bullet points inside comments. No lists. Write in sentences.
One idea per comment. Never try to say three things.

OUTPUT FORMAT
Return a valid JSON array with exactly the requested number of comment variations. Format:
[{"label":"Thread Pull","comment":"..."},{"label":"Affirm and Extend","comment":"..."},{"label":"Gentle Challenge","comment":"..."},{"label":"Personal Connection","comment":"..."}]
No other text, no markdown, no explanation. Just the raw JSON array.`;

function DropinRoom({dropin, setDropin, profile, geminiKey, geminiBackupKeys=[], toast}) {
  const [tab, setTab] = useState('research');
  // Research desk state
  const [mustTags, setMustTags] = useState([]);
  const [anyTags, setAnyTags] = useState([]);
  const [excludeTags, setExcludeTags] = useState([]);
  const [mustInput, setMustInput] = useState('');
  const [anyInput, setAnyInput] = useState('');
  const [excludeInput, setExcludeInput] = useState('');
  const [timeframe, setTimeframe] = useState('qdr:d');
  const [count, setCount] = useState('10');
  const [presets, setPresets] = useState(dropin.presets || []);
  const [presetModal, setPresetModal] = useState(false);
  const [presetName, setPresetName] = useState('');
  const [editPresetId, setEditPresetId] = useState(null);
  // Staged posts
  const [staged, setStaged] = useState([]);
  const [stageForm, setStageForm] = useState({text:'', link:''});
  // Comment engine state
  const [addManualOpen, setAddManualOpen] = useState(true);
  const [manualForm, setManualForm] = useState({author:'', text:'', link:''});
  const [genSettings, setGenSettings] = useState({variations: dropin.settings?.defaultVariations||4, length:'mix', tone:'random'});
  const [loading, setLoading] = useState({});
  const [expanded, setExpanded] = useState({});
  // Settings state
  const [spOpen, setSpOpen] = useState(false);
  const [newBackupKey, setNewBackupKey] = useState('');
  const [newAngle, setNewAngle] = useState('');
  const [showPrimary, setShowPrimary] = useState(false);
  const keyIndexRef = useRef(0);

  const posts = dropin.posts || [];
  const results = dropin.results || {};
  const dp = dropin.settings || {};

  const updDropin = (key, val) => setDropin(d => ({...d, [key]: val}));
  const updSettings = (key, val) => setDropin(d => ({...d, settings: {...d.settings, [key]: val}}));

  /* ── QUERY BUILDER ── */
  const buildQuery = () => {
    let parts = ['site:linkedin.com/posts'];
    if (mustTags.length) parts.push(mustTags.map(t => `"${t}"`).join(' AND '));
    if (anyTags.length) { const or = anyTags.map(t => `"${t}"`).join(' OR '); parts.push(anyTags.length > 1 ? `(${or})` : or); }
    if (excludeTags.length) parts.push(excludeTags.map(t => `-"${t}"`).join(' '));
    return parts.join(' ');
  };

  const openSearch = () => {
    const q = buildQuery();
    if (q === 'site:linkedin.com/posts') { toast('Add at least one term first', 'err'); return; }
    const tbs = timeframe !== 'any' ? `&tbs=${timeframe}` : '';
    window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}${tbs}&num=${count}`, '_blank');
    toast('Google opened. Copy posts and add them below.', 'info');
  };

  const addTag = (type, val) => {
    const clean = val.trim().replace(/^["']|["']$/g, '');
    if (!clean) return;
    if (type === 'must' && !mustTags.includes(clean)) { setMustTags(t => [...t, clean]); setMustInput(''); }
    if (type === 'any'  && !anyTags.includes(clean))  { setAnyTags(t => [...t, clean]);  setAnyInput(''); }
    if (type === 'exclude' && !excludeTags.includes(clean)) { setExcludeTags(t => [...t, clean]); setExcludeInput(''); }
  };
  const removeTag = (type, val) => {
    if (type === 'must')    setMustTags(t => t.filter(x => x !== val));
    if (type === 'any')     setAnyTags(t => t.filter(x => x !== val));
    if (type === 'exclude') setExcludeTags(t => t.filter(x => x !== val));
  };
  const clearQuery = () => { setMustTags([]); setAnyTags([]); setExcludeTags([]); setMustInput(''); setAnyInput(''); setExcludeInput(''); };

  /* ── PRESETS ── */
  const loadPreset = (p) => {
    setMustTags(p.mustTags||[]); setAnyTags(p.anyTags||[]);
    setExcludeTags(p.excludeTags||[]); setTimeframe(p.timeframe||'qdr:d'); setCount(p.count||'10');
  };
  const savePreset = () => {
    if (!presetName.trim()) { toast('Enter a name', 'err'); return; }
    const preset = { id: editPresetId || ('p-'+Date.now()), name: presetName, mustTags, anyTags, excludeTags, timeframe, count };
    const updated = editPresetId ? presets.map(p => p.id === editPresetId ? preset : p) : [...presets, preset];
    setPresets(updated); updDropin('presets', updated);
    setPresetModal(false); setPresetName(''); setEditPresetId(null);
    toast(editPresetId ? 'Preset updated' : 'Preset saved');
  };
  const deletePreset = (id) => { const u = presets.filter(p => p.id !== id); setPresets(u); updDropin('presets', u); toast('Preset deleted'); };

  /* ── STAGED POSTS ── */
  const addStaged = () => {
    if (!stageForm.text.trim()) { toast('Paste post text first', 'err'); return; }
    setStaged(s => [...s, {id: Date.now(), ...stageForm}]);
    setStageForm({text:'', link:''});
    toast('Post staged');
  };
  const removeStaged = (id) => setStaged(s => s.filter(p => p.id !== id));
  const clearStaged = () => { setStaged([]); toast('Staging area cleared', 'info'); };
  const sendAllToEngine = () => {
    if (!staged.length) { toast('No posts staged yet', 'err'); return; }
    const newPosts = staged.map(p => ({id: Date.now() + Math.random(), text: p.text, author:'', link: p.link||''}));
    updDropin('posts', [...newPosts, ...posts]);
    setStaged([]);
    setTab('engine');
    toast(`${newPosts.length} post${newPosts.length !== 1 ? 's' : ''} sent to Comment Engine`);
  };

  /* ── KEY MANAGEMENT ── */
  const getKey = () => {
    const own = [dp.primaryKey, ...(dp.backupKeys||[])].filter(k => k && k.trim());
    const shared = [geminiKey, ...geminiBackupKeys].filter(k => k && k.trim().length > 10);
    const all = own.length ? own : shared;
    return all[keyIndexRef.current % Math.max(1, all.length)] || null;
  };
  const rotateKey = () => { const all = [dp.primaryKey, ...(dp.backupKeys||[])].filter(k=>k); keyIndexRef.current = (keyIndexRef.current + 1) % Math.max(1, all.length); };
  const getAllKeys = () => [dp.primaryKey, ...(dp.backupKeys||[])].filter(k => k && k.trim());
  const addBackupKey = () => { if (!newBackupKey.trim()) return; updSettings('backupKeys', [...(dp.backupKeys||[]), newBackupKey.trim()]); setNewBackupKey(''); toast('Backup key added'); };
  const removeBackupKey = (i) => { const k = [...(dp.backupKeys||[])]; k.splice(i,1); updSettings('backupKeys', k); };

  /* ── AI CALL ── */
  const buildPrompt = (postText, postAuthor) => {
    const p = profile || {};
    const customAngles = dp.customAngles || [];
    const anglesNote = customAngles.length ? '\nExtra angles:\n' + customAngles.map(a => '- ' + a).join('\n') : '';
    const toneNote = genSettings.tone && genSettings.tone !== 'random' ? `\nTone: ${genSettings.tone}` : '';
    const profileCtx = `Name: ${p.name||'Ehijele David'}\nRole: ${p.role||'Data Analyst, Decision Intelligence Systems'}\nVoice: ${p.voiceTone||'Curious, systems-minded, conversational, warm'}\nAvoid: ${p.avoid||'em dashes, corporate language'}`.trim();
    const lengthInstr = genSettings.length==='short' ? 'under 40 words' : genSettings.length==='long' ? '60 to 80 words' : 'mix of short and longer';
    return `${dp.systemPrompt||DROPIN_DEFAULT_SP}\n\nPROFILE:\n${profileCtx}\n\nSETTINGS:\n- Variations: ${genSettings.variations}\n- Length: ${lengthInstr}${toneNote}${anglesNote}\n\nPOST:\n${postAuthor ? 'Author: '+postAuthor+'\n' : ''}${postText}\n\nGenerate exactly ${genSettings.variations} comment variations as a JSON array. Each object must have "label" and "comment". Return ONLY the JSON array.`;
  };

  const callGemini = async (prompt) => {
    const key = getKey();
    if (!key) throw new Error('No API key. Add one in Dropin Settings or General Settings.');
    const model = dp.model || 'gemini-2.5-flash';
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({contents:[{parts:[{text:prompt}]}], generationConfig:{maxOutputTokens:2048,temperature:0.85}})
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      if (resp.status === 429) { rotateKey(); throw new Error('Quota hit, key rotated. Retry.'); }
      throw new Error(e.error?.message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    const text = (data.candidates?.[0]?.content?.parts||[]).map(p => p.text||'').join('');
    if (!text) throw new Error('No content returned');
    return text;
  };

  const generate = async (id) => {
    const post = posts.find(p => p.id === id);
    if (!post) return;
    if (!getKey()) { toast('Add Gemini API key in Settings tab', 'err'); return; }
    setLoading(l => ({...l, [id]: true}));
    setDropin(d => ({...d, results: {...d.results, [id]: {generating: true}}}));
    setExpanded(e => ({...e, [id]: true}));
    try {
      const raw = await callGemini(buildPrompt(post.text, post.author));
      const clean = raw.replace(/```json|```/g, '').trim();
      const variations = JSON.parse(clean);
      setDropin(d => ({...d, results: {...d.results, [id]: {variations}}}));
      toast(`${variations.length} variations ready`);
    } catch(e) {
      setDropin(d => ({...d, results: {...d.results, [id]: {error: e.message}}}));
      toast(e.message, 'err');
    }
    setLoading(l => ({...l, [id]: false}));
  };

  const generateAll = async () => {
    const pending = posts.filter(p => !results[p.id] || results[p.id].error);
    if (!pending.length) { toast('All posts already generated'); return; }
    if (!getKey()) { toast('Add Gemini API key first', 'err'); return; }
    for (const p of pending) {
      await generate(p.id);
      await new Promise(r => setTimeout(r, (dp.pause||5) * 1000));
    }
  };

  const addManualPost = () => {
    if (!manualForm.text.trim()) { toast('Paste a post first', 'err'); return; }
    updDropin('posts', [...posts, {id: Date.now(), ...manualForm}]);
    setManualForm({author:'', text:'', link:''});
    toast('Post added');
  };

  const removePost = (id) => {
    const nr = {...results}; delete nr[id];
    setDropin(d => ({...d, posts: d.posts.filter(p => p.id !== id), results: nr}));
  };

  const exportWorkspace = () => {
    const blob = new Blob([JSON.stringify(dropin, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'dropin-workspace.json'; a.click();
    toast('Workspace exported');
  };

  const done = posts.filter(p => results[p.id] && !results[p.id].error && !results[p.id].generating).length;
  const pendingCount = posts.filter(p => !results[p.id] || results[p.id].error).length;
  const pct = posts.length ? Math.round(done/posts.length*100) : 0;
  const allKeys = getAllKeys();

  const TAG_STYLE = {
    must:    {bg:'rgba(0,200,150,.12)',  border:'rgba(0,200,150,.35)',  color:'var(--green)'},
    any:     {bg:'rgba(61,126,255,.12)', border:'rgba(61,126,255,.35)', color:'#7AA8FF'},
    exclude: {bg:'rgba(239,68,68,.12)',  border:'rgba(239,68,68,.35)',  color:'#F87171'},
  };

  const TagSection = ({type, tags, input, setInput, label, hint, placeholder}) => (
    <div style={{marginBottom:14}}>
      <div style={{display:'flex',alignItems:'baseline',gap:7,marginBottom:6}}>
        <span style={{fontSize:9.5,fontWeight:700,color:TAG_STYLE[type].color,textTransform:'uppercase',letterSpacing:'1px',fontFamily:'var(--font-mono)'}}>{label}</span>
        <span style={{fontSize:10,color:'var(--text3)'}}>{hint}</span>
      </div>
      <div style={{display:'flex',gap:7,marginBottom:tags.length?7:0}}>
        <input className="inp" style={{flex:1}} value={input} onChange={e=>setInput(e.target.value)}
          placeholder={placeholder}
          onKeyDown={e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();addTag(type,input);}}}/>
        <button className="btn btn-g btn-sm" onClick={()=>addTag(type,input)}>Add</button>
      </div>
      {tags.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          {tags.map(t => { const s = TAG_STYLE[type]; return (
            <div key={t} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 9px',background:s.bg,border:`1px solid ${s.border}`,borderRadius:20,fontSize:11,fontFamily:'var(--font-mono)',color:s.color}}>
              {type==='exclude'?'-':''}&quot;{t}&quot;
              <button onClick={()=>removeTag(type,t)} style={{background:'none',border:'none',cursor:'pointer',color:s.color,fontSize:13,lineHeight:1,padding:0,opacity:.7}}>×</button>
            </div>
          );})}
        </div>
      )}
    </div>
  );

  return (
    <div>
      <div className="tab-bar">
        {[['research','Research Desk'],['engine','Comment Engine'],['dropin-settings','Settings']].map(([id,lbl])=>(
          <button key={id} className={`tab-btn${tab===id?' act':''}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>

      {/* ── RESEARCH DESK ── */}
      {tab==='research' && (
        <div>
          {/* Presets */}
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12,gap:12}}>
            <div style={{flex:1}}>
              {presets.length > 0 && (
                <>
                  <div className="sec-hd" style={{marginBottom:8}}>Saved Presets</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                    {presets.map(p => (
                      <div key={p.id} style={{display:'flex',alignItems:'center',background:'var(--surface)',border:'1px solid var(--border2)',borderRadius:8,overflow:'hidden'}}>
                        <button onClick={()=>loadPreset(p)} style={{padding:'6px 12px',background:'none',border:'none',cursor:'pointer',color:'var(--text)',fontSize:12,fontFamily:'var(--font-body)',fontWeight:500}}>{p.name}</button>
                        <button onClick={()=>{setEditPresetId(p.id);setPresetName(p.name);loadPreset(p);setPresetModal(true);}} style={{padding:'6px 7px',background:'none',border:'none',borderLeft:'1px solid var(--border)',cursor:'pointer',color:'var(--text3)',fontSize:11}}>✎</button>
                        <button onClick={()=>deletePreset(p.id)} style={{padding:'6px 7px',background:'none',border:'none',borderLeft:'1px solid var(--border)',cursor:'pointer',color:'var(--red)',fontSize:11}}>×</button>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
            <button className="btn btn-g btn-sm" style={{flexShrink:0,marginTop:presets.length?18:0}} onClick={()=>{setPresetModal(true);setPresetName('');setEditPresetId(null);}}>Save Current as Preset</button>
          </div>

          {/* Query Builder */}
          <div className="card">
            <div className="card-hd">
              <div>
                <div className="card-title">Query Builder</div>
                <div className="card-sub">Builds a structured Google search to find LinkedIn posts</div>
              </div>
            </div>
            <div className="card-bd">
              {/* Query preview */}
              <div style={{marginBottom:14,padding:'6px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7}}>
                <span style={{fontSize:9.5,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1px',fontFamily:'var(--font-mono)',marginRight:8}}>Query</span>
                <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--green)',wordBreak:'break-all'}}>{buildQuery()}</span>
              </div>

              <TagSection type="must" tags={mustTags} input={mustInput} setInput={setMustInput}
                label="Must contain" hint="all of these must appear in the post"
                placeholder={`e.g. founder, "out of stock", inventory...`}/>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:-10,marginBottom:12}}>Press Enter or click Add. Each term becomes "term" joined with AND.</div>

              <TagSection type="any" tags={anyTags} input={anyInput} setInput={setAnyInput}
                label="Any of these" hint="at least one must appear — leave blank to skip"
                placeholder={`e.g. chaos, "falling apart", overwhelmed...`}/>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:-10,marginBottom:12}}>All terms joined with OR inside brackets.</div>

              <TagSection type="exclude" tags={excludeTags} input={excludeInput} setInput={setExcludeInput}
                label="Exclude" hint="posts containing these will be removed — optional"
                placeholder="e.g. job, hiring, apply..."/>

              <div className="g2" style={{marginBottom:14}}>
                <div className="field" style={{marginBottom:0}}>
                  <label className="lbl">Timeframe</label>
                  <select className="inp" value={timeframe} onChange={e=>setTimeframe(e.target.value)}>
                    <option value="qdr:d">Past 24 hours</option>
                    <option value="qdr:w">Past week</option>
                    <option value="qdr:m">Past month</option>
                    <option value="any">Any time</option>
                  </select>
                </div>
                <div className="field" style={{marginBottom:0}}>
                  <label className="lbl">Number of results</label>
                  <input className="inp" type="number" value={count} onChange={e=>setCount(e.target.value)} min="5" max="50"/>
                </div>
              </div>

              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <button className="btn btn-p" onClick={openSearch} style={{background:'var(--green)',color:'#000',fontWeight:700}}>
                  <span style={{fontSize:13}}>⌕</span> Open in Google
                </button>
                <button className="btn btn-g" onClick={clearQuery}>Clear Query</button>
              </div>
            </div>
          </div>

          {/* Staged Posts */}
          <div className="card">
            <div className="card-hd">
              <div>
                <div className="card-title">Staged Posts</div>
                <div className="card-sub">Add posts here as you find them on Google. Send all to engine when ready.</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--font-mono)'}}>{staged.length} post{staged.length!==1?'s':''}</span>
                {staged.length > 0 && <button className="btn btn-g btn-sm" onClick={clearStaged}>Clear All</button>}
                {staged.length > 0 && (
                  <button className="btn btn-sm" style={{background:'var(--green)',color:'#000',fontWeight:700}} onClick={sendAllToEngine}>
                    → Send All to Engine
                  </button>
                )}
              </div>
            </div>
            <div className="card-bd">
              {/* Staged list */}
              {staged.map((p,i) => (
                <div key={p.id} style={{display:'flex',alignItems:'flex-start',gap:11,padding:'11px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{width:22,height:22,borderRadius:'50%',background:'var(--green-dim)',border:'1px solid var(--green-mid)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontFamily:'var(--font-mono)',color:'var(--green)',flexShrink:0,marginTop:2}}>{i+1}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:5}}>{p.text.slice(0,120)}{p.text.length>120?'...':''}</div>
                    {p.link
                      ? <a href={p.link} target="_blank" rel="noopener" style={{fontSize:11,color:'var(--green)',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',border:'1px solid var(--green-mid)',borderRadius:20,background:'var(--green-dim)'}}>View on LinkedIn ↗</a>
                      : <span style={{fontSize:11,color:'var(--text3)'}}>No link added</span>}
                  </div>
                  <button onClick={()=>removeStaged(p.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:16,lineHeight:1,padding:0,flexShrink:0}}>×</button>
                </div>
              ))}
              {/* Add post form */}
              <div style={{marginTop:staged.length?14:0}}>
                <div className="field">
                  <label className="lbl">Post text</label>
                  <textarea className="inp" rows="4" value={stageForm.text} onChange={e=>setStageForm({...stageForm,text:e.target.value})} placeholder="Paste the full post text here..."/>
                </div>
                <div className="field">
                  <label className="lbl">Post link <span style={{fontWeight:400,color:'var(--text3)',fontSize:10}}>optional</span></label>
                  <input className="inp" value={stageForm.link} onChange={e=>setStageForm({...stageForm,link:e.target.value})} placeholder="https://linkedin.com/posts/..."
                    onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addStaged();}}}/>
                </div>
                <button className="btn btn-p" style={{background:'var(--green)',color:'#000',fontWeight:700}} onClick={addStaged}>+ Add Post</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── COMMENT ENGINE ── */}
      {tab==='engine' && (
        <div>
          {/* Engine controls bar */}
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
              <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
                <span style={{fontSize:9.5,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1.2px',fontFamily:'var(--font-mono)'}}>Comment Engine</span>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:10.5,color:'var(--text3)',fontWeight:600}}>VARIATIONS</span>
                  <select className="inp" style={{width:'auto',padding:'4px 8px',fontSize:12}} value={genSettings.variations} onChange={e=>setGenSettings({...genSettings,variations:+e.target.value})}>
                    {[2,3,4,5,6].map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:10.5,color:'var(--text3)',fontWeight:600}}>LENGTH</span>
                  <select className="inp" style={{width:'auto',padding:'4px 8px',fontSize:12}} value={genSettings.length} onChange={e=>setGenSettings({...genSettings,length:e.target.value})}>
                    <option value="mix">Mix</option><option value="short">Short</option><option value="long">Long</option>
                  </select>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:10.5,color:'var(--text3)',fontWeight:600}}>TONE</span>
                  <select className="inp" style={{width:'auto',padding:'4px 8px',fontSize:12}} value={genSettings.tone} onChange={e=>setGenSettings({...genSettings,tone:e.target.value})}>
                    <option value="random">Random</option><option value="warm">Warm</option><option value="analytical">Analytical</option><option value="direct">Direct</option>
                  </select>
                </div>
              </div>
              <div style={{display:'flex',gap:7}}>
                <button className="btn btn-g btn-sm" onClick={()=>setDropin(d=>({...d,posts:[],results:{}}))}>Clear All</button>
                <button className="btn btn-sm" style={{background:'var(--green)',color:'#000',fontWeight:700}} onClick={generateAll}>Generate All</button>
              </div>
            </div>
            <div style={{display:'flex',gap:14,fontSize:10.5,fontFamily:'var(--font-mono)',color:'var(--text3)',marginTop:8}}>
              <span style={{color:'var(--green)'}}>{done} done</span>
              <span>{pendingCount} pending</span>
              {allKeys.length > 0 && <span>{allKeys.length} key{allKeys.length!==1?'s':''} · {allKeys.length>1?'auto-rotation on':'single key'}</span>}
            </div>
            {posts.length > 0 && <div className="prog-track" style={{marginTop:8}}><div className="prog-fill" style={{width:`${pct}%`}}/></div>}
          </div>

          {/* Add Post Manually — collapsible */}
          <div className="card" style={{marginBottom:12}}>
            <div className="card-hd" style={{cursor:'pointer'}} onClick={()=>setAddManualOpen(o=>!o)}>
              <div className="card-title" style={{fontSize:11,textTransform:'uppercase',letterSpacing:'1px',fontFamily:'var(--font-mono)',color:'var(--text3)'}}>Add Post Manually</div>
              <button className="btn btn-g btn-xs" onClick={e=>{e.stopPropagation();setAddManualOpen(o=>!o)}}>{addManualOpen?'+ Collapse':'+ Expand'}</button>
            </div>
            {addManualOpen && (
              <div className="card-bd">
                <div className="g2" style={{marginBottom:10}}>
                  <div className="field" style={{marginBottom:0}}>
                    <label className="lbl">Author name <span style={{fontWeight:400,color:'var(--text3)',fontSize:10}}>optional</span></label>
                    <input className="inp" value={manualForm.author} onChange={e=>setManualForm({...manualForm,author:e.target.value})} placeholder="Founder, CEO..."/>
                  </div>
                  <div className="field" style={{marginBottom:0}}>
                    <label className="lbl">Post link <span style={{fontWeight:400,color:'var(--text3)',fontSize:10}}>optional</span></label>
                    <input className="inp" value={manualForm.link} onChange={e=>setManualForm({...manualForm,link:e.target.value})} placeholder="https://linkedin.com/..."/>
                  </div>
                </div>
                <div className="field"><label className="lbl">Post text</label><textarea className="inp" rows="4" value={manualForm.text} onChange={e=>setManualForm({...manualForm,text:e.target.value})} placeholder="Paste the LinkedIn post here..."/></div>
                <button className="btn btn-p" style={{background:'var(--green)',color:'#000',fontWeight:700}} onClick={addManualPost}>Add Post</button>
              </div>
            )}
          </div>

          {/* Post queue */}
          {posts.length === 0 && (
            <div className="empty-state">
              <div className="empty-icon">✦</div>
              <div className="empty-title">No posts yet</div>
              <div className="empty-desc">Add posts above or send them from the Research Desk</div>
            </div>
          )}
          {posts.map(post => {
            const result = results[post.id];
            const isLoad = loading[post.id];
            const status = isLoad||result?.generating ? 'busy' : result?.variations ? 'done' : result?.error ? 'failed' : 'pending';
            const isOpen = expanded[post.id];
            return (
              <div className={`post-card s-${status}`} key={post.id}>
                <div className="pc-hd" onClick={()=>setExpanded(e=>({...e,[post.id]:!e[post.id]}))}>
                  <div className="pc-dot"/>
                  <div className="pc-meta">
                    <div className="pc-preview">{post.text.slice(0,80)}{post.text.length>80?'...':''}</div>
                    <div className="pc-author">{post.author||'Unknown author'} · {status==='done'?`${result.variations?.length||0} variations ready`:status==='busy'?'Generating...':status==='failed'?'Generation failed':'Pending'}</div>
                  </div>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    {post.link && <a href={post.link} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} className="d100-link">↗</a>}
                    <button className="btn btn-g btn-sm" onClick={e=>{e.stopPropagation();generate(post.id)}} disabled={isLoad}>
                      {isLoad ? <><span className="spinner"/>Generating</> : 'Generate'}
                    </button>
                    <button className="btn btn-g btn-sm" style={{color:'var(--red)'}} onClick={e=>{e.stopPropagation();removePost(post.id)}}>Remove</button>
                  </div>
                </div>
                <div className={`pc-body${isOpen?' open':''}`}>
                  <div className="pc-text">{post.text}</div>
                  <div className="variations">
                    {!result && <div style={{fontSize:12,color:'var(--text3)',textAlign:'center',padding:10}}>Hit Generate to create comment variations</div>}
                    {result?.generating && <div style={{fontSize:12,color:'var(--text3)',display:'flex',alignItems:'center',justifyContent:'center',padding:10}}><span className="spinner"/>Generating comments...</div>}
                    {result?.error && <div style={{fontSize:12,color:'var(--red)',padding:10}}>{result.error}</div>}
                    {result?.variations?.map((v,i) => (
                      <div className="variation" key={i}>
                        <div className="var-hd"><span className="var-label">{v.label||`Variation ${i+1}`}</span><CopyBtn text={v.comment}/></div>
                        <div className="var-text">{v.comment}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── DROPIN SETTINGS ── */}
      {tab==='dropin-settings' && (
        <div>
          <div className="card">
            <div className="card-hd"><div className="card-title">Gemini API Key</div><div className="card-sub">Powers all AI features in Dropin</div></div>
            <div className="card-bd">
              <div className="field">
                <label className="lbl">Primary Key <span style={{fontWeight:400,color:'var(--text3)',fontSize:10}}>from Google AI Studio</span></label>
                <div style={{display:'flex',gap:7}}>
                  <input className="inp" style={{flex:1}} type={showPrimary?'text':'password'} value={dp.primaryKey||''} onChange={e=>updSettings('primaryKey',e.target.value)} placeholder="AIza..."/>
                  <button className="btn btn-g btn-sm" onClick={()=>setShowPrimary(s=>!s)}>{showPrimary?'Hide':'Show'}</button>
                </div>
              </div>
              <div className="field">
                <label className="lbl">Model</label>
                <select className="inp" value={dp.model||'gemini-2.5-flash'} onChange={e=>updSettings('model',e.target.value)}>
                  <option value="gemini-2.5-flash">gemini-2.5-flash (recommended)</option>
                  <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                  <option value="gemini-1.5-flash">gemini-1.5-flash</option>
                  <option value="gemini-1.5-pro">gemini-1.5-pro</option>
                </select>
              </div>
              <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4}}>
                <div style={{fontSize:9.5,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1.2px',marginBottom:8}}>
                  Backup Keys <span style={{textTransform:'none',letterSpacing:0,fontWeight:400,fontSize:10}}>auto-rotated when primary hits quota</span>
                </div>
                {(dp.backupKeys||[]).map((k,i) => (
                  <div className="api-key-row" key={i}>
                    <input className="inp" style={{flex:1}} type="password" value={k} onChange={e=>{ const keys=[...(dp.backupKeys||[])]; keys[i]=e.target.value; updSettings('backupKeys',keys); }} placeholder="AIza..."/>
                    <button className="rm-btn" onClick={()=>removeBackupKey(i)}>×</button>
                  </div>
                ))}
                <div style={{display:'flex',gap:7,marginTop:8}}>
                  <input className="inp" style={{flex:1}} type="password" value={newBackupKey} onChange={e=>setNewBackupKey(e.target.value)} placeholder="Add backup key..."/>
                  <button className="btn btn-p btn-sm" onClick={addBackupKey}>+</button>
                </div>
                <div style={{fontSize:10.5,color:'var(--text3)',marginTop:6,fontFamily:'var(--font-mono)'}}>
                  {allKeys.length} key{allKeys.length!==1?'s':''} total. {allKeys.length>1?'Auto-rotation enabled.':'Add backup keys to enable auto-rotation.'}
                </div>
              </div>
              <button className="btn btn-p" style={{marginTop:14}} onClick={()=>toast('Settings saved')}>Save Settings</button>
            </div>
          </div>
          <div className="card">
            <div className="card-hd"><div className="card-title">Preferences</div><div className="card-sub">Tool behavior and data</div></div>
            <div className="card-bd">
              <div style={{fontSize:9.5,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1.2px',marginBottom:10}}>Data Management</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <button className="btn btn-g btn-sm" onClick={exportWorkspace}>Export Workspace</button>
                <label className="btn btn-g btn-sm" style={{cursor:'pointer'}}>Import Workspace<input type="file" accept=".json" style={{display:'none'}} onChange={e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ try{const d=JSON.parse(ev.target.result);setDropin(prev=>({...prev,...d}));toast('Imported');}catch{toast('Invalid file','err');} }; r.readAsText(f); }}/></label>
                <button className="btn btn-sm" style={{background:'rgba(239,68,68,.1)',color:'var(--red)',border:'1px solid rgba(239,68,68,.3)'}} onClick={()=>{ if(window.confirm('Clear all Dropin data?')){ setDropin(initDropin()); toast('Cleared'); } }}>Clear All Data</button>
              </div>
            </div>
          </div>
          <div className="card">
            <div className="card-hd" style={{cursor:'pointer'}} onClick={()=>setSpOpen(o=>!o)}>
              <div><div className="card-title">System Prompt</div><div className="card-sub">The intelligence behind every comment. Edit anytime.</div></div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <button className="btn btn-g btn-sm" onClick={e=>{e.stopPropagation();updSettings('systemPrompt',DROPIN_DEFAULT_SP);toast('Reset to default');}}>Reset</button>
                <span style={{color:'var(--text3)',fontSize:16,display:'inline-block',transform:spOpen?'rotate(180deg)':'rotate(0)',transition:'transform .2s'}}>⌃</span>
              </div>
            </div>
            {spOpen && (
              <div className="card-bd">
                <textarea className="inp" rows="18" style={{fontFamily:'var(--font-mono)',fontSize:11.5,lineHeight:1.7}} value={dp.systemPrompt||DROPIN_DEFAULT_SP} onChange={e=>updSettings('systemPrompt',e.target.value)}/>

                  <input className="inp" style={{flex:1}} value={newAngle} onChange={e=>setNewAngle(e.target.value)} placeholder="e.g. Data perspective, Challenge assumption..."/>

              </div>
            </div>
          </div>
        </div>
      )}

      {/* Preset Modal */}
      {presetModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99}} onClick={()=>setPresetModal(false)}>

            <div className="field"><label className="lbl">Preset name</label><input className="inp" value={presetName} onChange={e=>setPresetName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&savePreset()} placeholder="e.g. Growth pressure, eCommerce founders" autoFocus/></div>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}


/* ── SETTINGS ── */
function Settings({settings,setSettings,geminiKey,setGeminiKey,geminiBackupKeys,setGeminiBackupKeys,geminiModel,setGeminiModel,lciProfile,setLciProfile,setLciResearch,setLciIdeation,setLciStudio,setLciLog,setStrategy,setIpTerms,setProofTiers,setProofEntries,setPhase,setD100,setDropin,darkMode,setDarkMode,onExport,onImport,toast,storagePersisted,requestPersist,lastBackupAt,githubToken,setGithubToken,githubRepo,setGithubRepo,githubPath,setGithubPath,githubBranch,setGithubBranch,githubIncludeKeys,setGithubIncludeKeys,githubBusy,lastPushAt,lastPullAt,onPushGithub,onPullGithub}) {

        openTo: p.openTo||'', targetAudience: p.targetAudience||p.audience||'',
        marketAwareness: p.marketAwareness||'', currentContext: p.currentContext||'',
        voiceTone: p.voiceTone||p.voice||'', personalTraits: p.personalTraits||'',
        avoidList: p.avoidList||p.avoid||'', signature: p.signature||'',

                    <span style={{position:'absolute',width:16,height:16,left:settings.lci?.resSuggestions!==false?21:3,top:3,background:'#fff',borderRadius:'50%',transition:'.2s',boxShadow:'0 1px 3px rgba(0,0,0,.3)'}}/>

              <div style={{padding:'14px 0'}}>

                <select className="inp" value={settings.lci?.defaultBucket||'In The Work'} onChange={e=>setSettings(s=>({...s,lci:{...s.lci,defaultBucket:e.target.value}}))}>

          </div>

          {/* LCI Tool Settings */}
          <div className="card">
            <div className="card-hd"><div className="card-title">Post Defaults</div><div className="card-sub">Default settings for Post Studio generation</div></div>
            <div className="card-bd">
              <div className="field"><label className="lbl">Default post length</label>
                <select className="inp" value={settings.lci?.postLength||'medium'} onChange={e=>setSettings(s=>({...s,lci:{...s.lci,postLength:e.target.value}}))}>
                  <option value="very short">Very Short (under 100 words)</option>
                  <option value="short">Short (100 to 150 words)</option>
                  <option value="medium">Medium (150 to 220 words)</option>
                  <option value="long">Long (250 to 350 words)</option>
                </select>
              </div>
              <div className="field"><label className="lbl">Default writing style</label>
                <select className="inp" value={settings.lci?.postStyle||'conversational'} onChange={e=>setSettings(s=>({...s,lci:{...s.lci,postStyle:e.target.value}}))}>
                  <option value="conversational">Conversational</option>
                  <option value="analytical">Analytical</option>
                  <option value="storytelling">Storytelling</option>
                  <option value="punchy">Punchy</option>
                </select>
              </div>
              <div className="field" style={{marginBottom:0}}><label className="lbl">Always avoid in generated content</label><input className="inp" value={settings.lci?.avoid||'em dashes, corporate jargon, leverage, synergy, actionable'} onChange={e=>setSettings(s=>({...s,lci:{...s.lci,avoid:e.target.value}}))}/></div>
            </div>
          </div>
        </div>
      )}


    </div>
  );

function resolveBucketIds(arr, buckets) {
  return arr.map(b => {
    if (typeof b === 'number') return b;
    const found = buckets.find(bk => bk.name && bk.name.toLowerCase() === b.toLowerCase());
    return found ? found.id : null;
  }).filter(Boolean);
}

/* ── LCI GEMINI HELPER ── */
async function lciCallGemini(apiKey, model, prompt, backupKeys=[]) {
  const allKeys = [apiKey, ...backupKeys].filter(k => k && k.trim().length > 10);
  let lastError = null;
  for (let i = 0; i < allKeys.length; i++) {
    const key = allKeys[i].trim();
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] })
      });
      if (!res.ok) { const e = await res.json(); lastError = new Error(e.error?.message||'API error'); continue; }
      const data = await res.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      if (text) return { text, keyIndex: i };
    } catch(e) { lastError = e; continue; }
  }
  throw lastError || new Error('All API keys failed');
}

/* ── LCI HELPER COMPONENTS ── */
function Field({f, upd, label, hint, k, placeholder, rows}) {
  return (
    <div className="field">
      <label className="label">{label}{hint&&<span className="label-hint">{hint}</span>}</label>
      {rows
        ? <textarea className="input" rows={rows} value={f[k]||''} onChange={e=>upd(k,e.target.value)} placeholder={placeholder}/>
        : <input className="input" value={f[k]||''} onChange={e=>upd(k,e.target.value)} placeholder={placeholder}/>
      }
    </div>
  );
}
function BucketTag({buckets, name}) {
  const b = buckets.find(x=>x.name===name);
  const color = b?.color || '#3D7EFF';
  return <span style={{fontSize:'11px',padding:'2px 9px',borderRadius:'20px',fontWeight:600,background:color+'22',color,border:`1px solid ${color}44`}}>{name||'Unset'}</span>;
}
function Stars({score}) {
  return <span className="star-score">{[1,2,3,4,5].map(i=><span key={i} className={`star ${i<=score?'filled':'empty'}`}>★</span>)}</span>;
}
function GradePill({grade, entry, all}) {
  const g = grade(entry, all);
  return <span className={`grade-pill ${g}`}>{g==='gold'?'🥇 Gold':g==='silver'?'🥈 Silver':g==='bronze'?'🥉 Bronze':'Ungraded'}</span>;
}

                const active = (draft.funnelStages||[]).includes(stage);
                return (
                  <button key={stage} onClick={()=>toggleFunnelStage(stage)}
                    style={{padding:'5px 12px',borderRadius:20,fontSize:11.5,fontWeight:600,cursor:'pointer',fontFamily:'var(--font-body)',transition:'all .15s',
                      border:`1.5px solid ${active?c:'var(--border2)'}`,
                      background:active?c+'18':'transparent',
                      color:active?c:'var(--text3)'}}>
                    {FUNNEL_LABELS[stage]}
                  </button>
                );
              })}
            </div>
          </div>
          <div className="field"><label className="label">Structure</label><textarea className="input" rows={3} value={draft.structure||''} onChange={e=>upd('structure',e.target.value)}/></div>
          <div className="field"><label className="label">Body guidance</label><textarea className="input" rows={3} value={draft.body||''} onChange={e=>upd('body',e.target.value)}/></div>
          <div className="field"><label className="label">Closing</label><textarea className="input" rows={2} value={draft.closing||''} onChange={e=>upd('closing',e.target.value)}/></div>
          <div className="field" style={{marginBottom:0}}>
            <label className="label">Example hooks <span style={{fontWeight:400,color:'var(--text3)',fontSize:10}}>one per line</span></label>
            <textarea className="input" rows={4} value={(draft.hooks||[]).join('\n')} onChange={e=>upd('hooks',e.target.value.split('\n'))}/>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{padding:'10px 18px',borderTop:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center',marginTop:'auto'}}>
        {editing?(
          <>
            <button className="btn btn-primary btn-sm" onClick={()=>{onSave({...draft,hooks:(draft.hooks||[]).filter(h=>h.trim())});setEditing(false);}}>Save</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setDraft({...f});setEditing(false);}}>Cancel</button>
          </>
        ):(
          <>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setDraft({...f});setEditing(true);}}>Edit</button>
            <button style={{fontSize:11.5,fontWeight:600,padding:'5px 10px',borderRadius:7,border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.08)',color:'var(--red)',cursor:'pointer',fontFamily:'var(--font-body)'}} onClick={onDelete}>Delete</button>
          </>
        )}
      </div>
    </div>
  );
}

/* ── RESEARCH ROOM ── */
function ResearchRoom({ research, onChange, showToast, apiKey, backupKeys=[], model, profileBuckets=[] }) {
  const buckets = profileBuckets.length ? profileBuckets : DEFAULT_BUCKETS;
  const [mode, setMode] = useState('active');
  const [tab, setTab] = useState('creators');
  const [creators, setCreators] = useState(research.creators||[]);
  const [posts, setPosts] = useState(research.posts||[]);
  const [hypotheses, setHypotheses] = useState(research.hypotheses||[]);
  const [selFormats, setSelFormats] = useState(research.selectedFormats||[]);
  const [formatsLib, setFormatsLib] = useState(research.formatsLibrary && research.formatsLibrary.length ? research.formatsLibrary : FORMAT_LIBRARY_DEFAULTS);
  const [searchQuery, setSearchQuery] = useState('');
  const [loadingS, setLoadingS] = useState(false);
  const [editingFormat, setEditingFormat] = useState(null);
  const [expandedFormat, setExpandedFormat] = useState(null);
  const [funnelFilter, setFunnelFilter] = useState('');
  const [niche, setNiche] = useState('');
  const [audience, setAudience] = useState('');
  const [criteria, setCriteria] = useState('');
  const [loadingC, setLoadingC] = useState(false);
  const [showPostForm, setShowPostForm] = useState(false);
  const [postForm, setPostForm] = useState({content:'',creator:'',likes:0,comments:0,shares:0,saves:0,notes:''});
  const [loadingA, setLoadingA] = useState(false);

  const sync = (updates={}) => { const u={creators,posts,hypotheses,selectedFormats:selFormats,formatsLibrary:formatsLib,...updates}; onChange(u); };

  const syncFormats = (newLib, newSel) => { setFormatsLib(newLib); if(newSel!==undefined) setSelFormats(newSel); onChange({creators,posts,hypotheses,selectedFormats:newSel!==undefined?newSel:selFormats,formatsLibrary:newLib}); };

  const toggleFormat = (id) => { const u=selFormats.includes(id)?selFormats.filter(f=>f!==id):[...selFormats,id]; setSelFormats(u); onChange({creators,posts,hypotheses,selectedFormats:u,formatsLibrary:formatsLib}); };

  const searchFormats = async () => {
    if(!apiKey){showToast('Add API key in Settings','!');return;}
    if(!searchQuery.trim()){showToast('Enter a search term','!');return;}
    setLoadingS(true);
    try {
      const prompt = `You are a LinkedIn content strategy expert. Search query: "${searchQuery}". Find 3 LinkedIn post formats. For each return: id (kebab-case), name, buckets (1-2 from: ["In The Work","From The Room","The Angle","The Human","The Lesson"]), funnelStages (array of applicable stages from: ["awareness","education","consideration","conversion"] — pick 1-2 that best fit), color (one of: #2563EB,#10B981,#F59E0B,#EF4444,#8B5CF6,#EC4899,#06B6D4), when (one sentence), structure (sequence of steps), body (2-3 sentences), closing (1-2 sentences), hooks (array of 3 example opening lines with [brackets] for fill-in-the-blank). Return ONLY a valid JSON array of 3 objects. No em dashes.`;
      const {text:raw} = await lciCallGemini(apiKey, model, prompt, backupKeys);
      const results = JSON.parse(raw.replace(/```json|```/g,'').trim());
      const withMeta = results.map((f,i)=>({
        ...f, id:f.id+'-'+Date.now()+i, custom:true,
        hooks:Array.isArray(f.hooks)?f.hooks:[],
        buckets:resolveBucketIds(f.buckets||[],buckets),
        funnelStages:Array.isArray(f.funnelStages)?f.funnelStages:[],
      }));
      syncFormats([...formatsLib,...withMeta]);
      setSearchQuery('');
      showToast(`Added ${withMeta.length} formats`);
    } catch(e) { showToast('Search failed — check API key','x'); }
    setLoadingS(false);
  };

  const autoTagFormats = async () => {
    if(!apiKey){showToast('Add API key in Settings','!');return;}
    setLoadingS(true);
    try {
      const untagged = formatsLib.filter(f=>!f.funnelStages||f.funnelStages.length===0);
      if(!untagged.length){showToast('All formats already tagged');setLoadingS(false);return;}
      const prompt = `You are a LinkedIn content strategist. Classify each of these ${untagged.length} LinkedIn post formats with the appropriate funnel stages.

Funnel stages:
- awareness: broad relatable content for strangers, universal topics, no assumed knowledge
- education: teaching specific concepts, frameworks, how-to content
- consideration: POV content, contrarian takes, showing methodology and philosophy
- conversion: proof, transformation stories, before/after, case studies

Formats to classify:
${untagged.map((f,i)=>`${i+1}. id:"${f.id}" name:"${f.name}" when:"${f.when||''}" structure:"${f.structure||''}"`).join('\n')}

Return ONLY a valid JSON array where each object has: id (exact string from above), funnelStages (array with 1-2 applicable stage strings). No other fields. No em dashes.`;
      const {text:raw} = await lciCallGemini(apiKey, model, prompt, backupKeys);
      const tags = JSON.parse(raw.replace(/```json|```/g,'').trim());
      const tagMap = {};
      tags.forEach(t=>{ tagMap[t.id] = t.funnelStages||[]; });
      const updated = formatsLib.map(f=>({...f, funnelStages: tagMap[f.id]||f.funnelStages||[]}));
      syncFormats(updated, selFormats);
      showToast(`Tagged ${Object.keys(tagMap).length} formats`);
    } catch(e) { showToast('Auto-tag failed — check API key','x'); }
    setLoadingS(false);
  };

  const discoverCreators = async () => {
    if(!apiKey){showToast('Add API key in Settings','!');return;}
    if(!niche.trim()){showToast('Enter a niche','!');return;}
    setLoadingC(true);
    try {
      const prompt = `Find 8 LinkedIn creators worth studying in this niche: ${niche}. Target audience: ${audience||'business owners'}. Criteria: ${criteria||'any'}. Return JSON array. Each item: name, title, why (one sentence), contentStyle (2-3 words), focus. Return ONLY valid JSON array.`;
      const {text:raw} = await lciCallGemini(apiKey, model, prompt, backupKeys);
      const list = JSON.parse(raw.replace(/```json|```/g,'').trim());
      const withIds = list.map((c,i)=>({...c,id:Date.now()+i}));
      setCreators(withIds);
      onChange({creators:withIds,posts,hypotheses,selectedFormats:selFormats});
      showToast(`Found ${withIds.length} creators`);
    } catch(e) { showToast('Could not load creators','x'); }
    setLoadingC(false);
  };

  const gradePost = (post) => {
    const s=(post.likes||0)+(post.comments||0)*3+(post.shares||0)*4+(post.saves||0)*3;
    const all=posts.map(p=>(p.likes||0)+(p.comments||0)*3+(p.shares||0)*4+(p.saves||0)*3);
    if(all.length<2)return'pending';
    const avg=all.reduce((a,b)=>a+b,0)/all.length;
    if(s>=avg*1.5)return'gold';
    if(s>=avg*0.7)return'silver';
    return'bronze';
  };

  const addPost = () => {
    if(!postForm.content.trim()){showToast('Add post content first','!');return;}
    const u=[...posts,{...postForm,id:Date.now()}];
    setPosts(u);
    setPostForm({content:'',creator:'',likes:0,comments:0,shares:0,saves:0,notes:''});
    setShowPostForm(false);
    onChange({creators,posts:u,hypotheses,selectedFormats:selFormats,formatsLibrary:formatsLib});
    showToast('Post added');
  };

  const removePost = (id) => { const u=posts.filter(p=>p.id!==id); setPosts(u); onChange({creators,posts:u,hypotheses,selectedFormats:selFormats,formatsLibrary:formatsLib}); };

  const analyseAll = async () => {
    if(!apiKey){showToast('Add API key in Settings','!');return;}
    if(posts.length<3){showToast('Add at least 3 posts to analyse','!');return;}
    setLoadingA(true);
    try {
      const postData=posts.map((p,i)=>({index:i+1,content:p.content.slice(0,300),likes:p.likes,comments:p.comments,shares:p.shares,saves:p.saves,grade:gradePost(p)}));
      const prompt=`Analyse ${posts.length} LinkedIn posts with engagement data: ${JSON.stringify(postData,null,2)}. Gold posts are highest performers. Return JSON object with: hypotheses (array of 5-7 specific testable strings), goldPatterns (3-4 strings), bronzePatterns (2-3 strings), topInsight (one sentence). Return ONLY valid JSON.`;
      const {text:raw}=await lciCallGemini(apiKey,model,prompt,backupKeys);
      const result=JSON.parse(raw.replace(/```json|```/g,'').trim());
      const hyps=(result.hypotheses||[]).map((h,i)=>({id:Date.now()+i,text:h,validated:false,source:'analysis'}));
      setHypotheses(hyps);
      onChange({creators,posts,hypotheses:hyps,selectedFormats:selFormats,formatsLibrary:formatsLib});
      showToast('Analysis complete');
      setTab('hypotheses');
    } catch(e){ showToast('Analysis failed','x'); }
    setLoadingA(false);
  };

  const toggleHypValidated = (id) => { const u=hypotheses.map(h=>h.id===id?{...h,validated:!h.validated}:h); setHypotheses(u); onChange({creators,posts,hypotheses:u,selectedFormats:selFormats}); };
  const removeHyp = (id) => { const u=hypotheses.filter(h=>h.id!==id); setHypotheses(u); onChange({creators,posts,hypotheses:u,selectedFormats:selFormats}); };

  const getColor = (idx) => {
    const clrs=['#3D7EFF','#00C896','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4'];
    return clrs[idx%clrs.length];
  };

  return (
    <div className="lci-room">
      <div className="mode-switcher">
        <button className={`mode-btn ${mode==='active'?'active':''}`} onClick={()=>setMode('active')}>Active Research</button>
        <button className={`mode-btn ${mode==='library'?'active':''}`} onClick={()=>setMode('library')}>Format Library</button>
      </div>

      {mode==='active' && (<>
        <div className="tab-nav">
          <button className={`tab-btn ${tab==='creators'?'active':''}`} onClick={()=>setTab('creators')}>Creator Discovery</button>
          <button className={`tab-btn ${tab==='posts'?'active':''}`} onClick={()=>setTab('posts')}>Post Analysis {posts.length>0&&`(${posts.length})`}</button>
